<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION</title>
    <style>
        :root { --bg: #000; --acc: #C5A059; --panel: #0a0a0a; }
        * { font-family: 'Times New Roman', serif; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #e0e0e0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        /* 画面全体を3つのセクションで固定 */
        #game-container { width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; }
        
        /* 1. 上部タブ (5vh) */
        nav { height: 6vh; background: #111; display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--acc); }
        .nav-btn { background: transparent; color: #666; border: none; font-weight: bold; cursor: pointer; font-size: clamp(10px, 3vw, 14px); }
        .nav-btn.active { color: var(--acc); }

        /* 2. メイン表示エリア (89vh) */
        #view-area { flex: 1; background: #000; overflow: hidden; }
        .tab-content { display: none; height: 100%; width: 100%; }
        .tab-content.active { display: block; }

        /* 20名一画面固定グリッド (5×4) */
        .roster-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(4, 1fr);
            height: 100%; 
            gap: 1px; /* 最小の隙間 */
        }
        .unit-card { 
            background: var(--panel); border: 1px solid #1a1a1a; 
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 2px;
        }
        .unit-card.in-party { border-color: var(--acc); background: #151000; }
        .unit-card .id-num { position: absolute; top: 1px; left: 2px; color: var(--acc); font-size: 9px; }
        .unit-card .name { font-size: clamp(8px, 2.2vw, 11px); color: #fff; line-height: 1.1; margin-bottom: 1px; white-space: nowrap; }
        .unit-card .class-name { color: var(--acc); font-size: clamp(6px, 1.8vw, 9px); white-space: nowrap; opacity: 0.8; }

        /* 3. 下部ステータスバー (5vh) */
        footer { height: 5vh; background: #050505; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 8px; font-size: 11px; color: #888; }

        /* 編成UI */
        .party-view { height: 100%; display: flex; flex-direction: column; padding: 2px; gap: 2px; }
        .unit-row { display: flex; gap: 2px; flex: 1; }
        .mini-slot { flex: 1; background: #001122; border: 1px solid #002244; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; }

        /* 探索（暫定） */
        #tab-dungeon { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div id="game-container">
    <nav id="base-nav">
        <button id="nav-roster" class="nav-btn active" onclick="showTab('roster')">ROSTER</button>
        <button id="nav-party" class="nav-btn" onclick="showTab('party')">PARTY</button>
        <button id="nav-dungeon" class="nav-btn" onclick="showTab('dungeon')">EXPLORE</button>
    </nav>

    <main id="view-area">
        <section id="tab-roster" class="tab-content active">
            <div class="roster-grid" id="roster-list"></div>
        </section>

        <section id="tab-party" class="tab-content">
            <div id="party-edit" class="party-view"></div>
        </section>

        <section id="tab-dungeon" class="tab-content">
            <button class="nav-btn" style="border:1px solid var(--acc); padding:15px 30px; color:var(--acc);" onclick="alert('START')">ASCEND</button>
        </section>
    </main>

    <footer>
        <div>GOLD: 10,000</div>
        <div style="letter-spacing: 1px;">BABEL: THE ASCENSION</div>
    </footer>
</div>

<script>
const ROSTER = [
    {id:1, n:"グラディウス", c:"パラディン"}, {id:2, n:"ヴァレリア", c:"ソードマスター"},
    {id:3, n:"バルド", c:"バーサーカー"}, {id:4, n:"セレネ", c:"デュアルブレイド"},
    {id:5, n:"レイス", c:"シーフ"}, {id:6, n:"リュカ", c:"アーチャー"},
    {id:7, n:"アルベルト", c:"デュエリスト"}, {id:8, n:"カエデ", c:"ファイター"},
    {id:9, n:"ジーク", c:"ウィザード"}, {id:10, n:"エリア", c:"クレリック"},
    {id:11, n:"ラウル", c:"ソーサラー"}, {id:12, n:"ミラ", c:"サポート"},
    {id:13, n:"キリガ", c:"アサシン"}, {id:14, n:"リリス", c:"アサシン"},
    {id:15, n:"ゼイン", c:"ダークナイト"}, {id:16, n:"イザナ", c:"ブラッドナイト"},
    {id:17, n:"ギル", c:"ガンナー"}, {id:18, n:"クロノ", c:"タイムメイジ"},
    {id:19, n:"フィオナ", c:"ドラグーン"}, {id:20, n:"アベル", c:"イレイザー"}
];
let party = [1, 2, 3, 4, 5, 6];

function renderRoster() {
    document.getElementById('roster-list').innerHTML = ROSTER.map(u => `
        <div class="unit-card ${party.includes(u.id)?'in-party':''}" onclick="toggleMember(${u.id})">
            <span class="id-num">${String(u.id).padStart(2,'0')}</span>
            <span class="name">${u.n}</span>
            <span class="class-name">${u.c}</span>
        </div>`).join('');
}

function toggleMember(id) {
    const idx = party.indexOf(id);
    if(idx !== -1) party.splice(idx, 1);
    else if(party.length < 6) party.push(id);
    renderRoster();
}

function renderParty() {
    const edit = document.getElementById('party-edit');
    const r1 = party.slice(0,3), r2 = party.slice(3,6);
    const slot = (id) => {
        const u = ROSTER.find(x => x.id === id);
        return `<div class="mini-slot">${u ? u.n + '<br>' + u.c : 'EMPTY'}</div>`;
    };
    edit.innerHTML = `<div class="unit-row">${slot(r1[0])}${slot(r1[1])}${slot(r1[2])}</div>
                      <div class="unit-row">${slot(r2[0])}${slot(r2[1])}${slot(r2[2])}</div>`;
}

function showTab(id) {
    document.querySelectorAll('.tab-content, .nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    document.getElementById('nav-'+id).classList.add('active');
    if(id==='roster') renderRoster();
    if(id==='party') renderParty();
}

renderRoster();
</script>
</body>
</html>
