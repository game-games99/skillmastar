<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #1a1a1a;
            --accent-color: #ffd700;
            --text-color: #e0e0e0;
            --hp-color: #ff4d4d;
            --dex-color: #4da6ff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-layout {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: var(--panel-color);
            display: grid;
            grid-template-rows: 50px 1fr 120px 150px;
        }
        header {
            background: #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 2px solid var(--accent-color);
            font-weight: bold;
        }
        #party-view {
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        #battle-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #111;
        }
        #log-window {
            background: #000;
            padding: 10px;
            overflow-y: auto;
            color: #00ff00;
            font-size: 12px;
            font-family: monospace;
        }
        .unit-slot {
            background: #252525;
            margin-bottom: 5px;
            padding: 6px;
            border-left: 3px solid var(--dex-color);
            font-size: 13px;
        }
        .bar-container {
            width: 100%;
            height: 6px;
            background: #333;
            margin-top: 4px;
        }
        .hp-fill { height: 100%; background: var(--hp-color); transition: width 0.2s; }
        .enemy-box {
            width: 80%;
            padding: 15px;
            border: 2px solid #800;
            background: #200;
            text-align: center;
        }
        .btn-start {
            margin-top: 10px;
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="game-layout">
    <header>
        <div style="color:var(--accent-color)">BABEL</div>
        <div id="floor-tag">FLOOR: 1/100</div>
    </header>

    <div id="party-view">
        <div id="party-list"></div>
    </div>

    <div id="battle-view">
        <div id="enemy-target">待機中...</div>
        <button class="btn-start" id="start-btn">EXPLORATION START</button>
    </div>

    <div id="log-window"></div>
</div>

<script>
const KNIGHTS_DATA = [
    { id: 1, name: "グラディウス", hp: 1500, atk: 120, def: 200, dex: 300 },
    { id: 2, name: "ヴァレリア", hp: 900, atk: 180, def: 100, dex: 900 },
    { id: 3, name: "バルド", hp: 1300, atk: 200, def: 150, dex: 400 },
    { id: 4, name: "セレネ", hp: 1000, atk: 160, def: 110, dex: 800 },
    { id: 10, name: "エリア", hp: 900, atk: 80, def: 120, dex: 500 },
    { id: 12, name: "ミラ", hp: 1100, atk: 100, def: 140, dex: 450 },
    { id: 20, name: "アベル", hp: 1200, atk: 220, def: 130, dex: 650 }
];

let party = [];
let enemy = null;
let floor = 1;
let isBattle = false;

function addLog(m) {
    const d = document.createElement('div');
    d.innerHTML = `> ${m}`;
    const log = document.getElementById('log-window');
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
}

function render() {
    document.getElementById('party-list').innerHTML = party.map(u => `
        <div class="unit-slot">
            <div style="display:flex; justify-content:space-between">
                <span>${u.name}</span><span>HP:${Math.floor(u.curHp)}</span>
            </div>
            <div class="bar-container"><div class="hp-fill" style="width:${(u.curHp/u.hp)*100}%"></div></div>
        </div>
    `).join('');
    
    if(enemy) {
        document.getElementById('enemy-target').innerHTML = `
            <div class="enemy-box">
                <b>${enemy.name}</b><br>
                HP: ${Math.floor(enemy.curHp)} / ${enemy.hp}
                <div class="bar-container"><div class="hp-fill" style="width:${(enemy.curHp/enemy.hp)*100}%"></div></div>
            </div>
        `;
    }
}

async function start() {
    if(isBattle) return;
    isBattle = true;
    document.getElementById('start-btn').style.display = 'none';
    party = KNIGHTS_DATA.map(k => ({...k, curHp: k.hp}));
    
    while(floor <= 100 && party.some(p => p.curHp > 0)) {
        document.getElementById('floor-tag').innerText = `FLOOR: ${floor}/100`;
        enemy = {
            name: floor % 10 === 0 ? "BOSS: GUARDIAN" : "TOWER GOLEM",
            hp: 500 + (floor * 250),
            atk: 50 + (floor * 15),
            def: 20 + (floor * 8),
            dex: 150 + (floor * 10),
            curHp: 0
        };
        enemy.curHp = enemy.hp;
        addLog(`Floor ${floor} に突入。`);
        
        while(enemy.curHp > 0 && party.some(p => p.curHp > 0)) {
            const actors = [...party.filter(p => p.curHp > 0), enemy].sort((a,b) => b.dex - a.dex);
            for(let a of actors) {
                if(a.curHp <= 0 || enemy.curHp <= 0) continue;
                let t = (a === enemy) ? party.filter(p => p.curHp > 0)[0] : enemy;
                
                let dmg = Math.max(1, a.atk - (t.def/2));
                const crit = (a.dex / (a.dex + 2000)) * 100 > Math.random()*100;
                if(crit) dmg *= 1.5;
                
                t.curHp -= dmg;
                addLog(`${a.name}の攻撃: ${Math.floor(dmg)}点`);
                render();
                await new Promise(r => setTimeout(r, 100));
                if(party.every(p => p.curHp <= 0)) break;
            }
        }
        if(party.every(p => p.curHp <= 0)) break;
        floor++;
        addLog(`階層クリア。次のフロアへ...`);
        await new Promise(r => setTimeout(r, 500));
    }
    
    addLog(floor > 100 ? "完全制覇！" : "全滅...");
    isBattle = false;
    document.getElementById('start-btn').style.display = 'block';
    floor = 1;
}

window.onload = () => {
    document.getElementById('start-btn').addEventListener('click', start);
    addLog("準備完了。探索を開始してください。");
};
</script>
</body>
</html>
