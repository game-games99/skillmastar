<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION</title>
    <style>
        :root { --bg: #050505; --acc: #C5A059; --panel: #111; --header-blue: #003366; }
        body { background: #000; color: #e0e0e0; font-family: serif; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        #game-container { width: 100%; max-width: 600px; height: 100%; display: grid; grid-template-rows: 50px 1fr 60px; }
        
        header { background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--acc); font-size: 13px; z-index: 10; }
        #view-area { position: relative; overflow-y: auto; background: #000; -webkit-overflow-scrolling: touch; }
        nav { background: #1a1a1a; display: grid; grid-template-columns: repeat(3, 1fr); height: 60px; z-index: 10; border-top: 1px solid #333; }
        .nav-btn { background: #222; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        .nav-btn.active { background: var(--acc); color: #000; }

        .tab-content { display: none; padding: 5px; box-sizing: border-box; }
        .tab-content.active { display: block; }
        /* 最後にスクロールを確実に届かせるための余白 */
        .scroll-margin { height: 100px; width: 100%; }

        /* 画像レイアウト再現: 4列グリッド */
        .roster-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 4px; 
            background: #000;
        }
        .unit-card { 
            background: var(--panel); border: 1px solid #333; padding: 4px; 
            font-size: 8px; position: relative; aspect-ratio: 0.8;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .unit-card.in-party { border-color: var(--acc); background: #252000; }
        .unit-card .id-num { position: absolute; top: 2px; left: 3px; color: var(--acc); font-size: 9px; opacity: 0.8; }
        .unit-card .name { font-weight: bold; font-size: 9px; color: #fff; display: block; line-height: 1.1; margin-bottom: 2px; }
        .unit-card .class-name { color: var(--acc); font-size: 7px; white-space: nowrap; overflow: hidden; }
        .unit-card .lv-info { color: #888; font-size: 7px; }

        /* 探索UI（3+3） */
        .party-container { position: absolute; bottom: 0; width: 100%; height: 40%; background: #000; display: flex; flex-direction: column; gap: 2px; padding: 2px; border-top: 1px solid #333; }
        .unit-row { display: flex; justify-content: center; gap: 2px; flex: 1; }
        .unit-mini-card { flex: 1; background: #002244; border: 1px solid #004488; display: flex; flex-direction: column; overflow: hidden; }
        .unit-mini-card .name-tag { background: #003366; font-size: 9px; text-align: center; color: #fff; padding: 1px; }
        .unit-mini-card .hp-bar { height: 4px; background: #111; margin: 2px; border: 1px solid #333; position: relative; }
        .unit-mini-card .hp-fill { height: 100%; background: #4caf50; width: 100%; }

        .explore-header { position: absolute; top: 0; width: 100%; height: 70px; background: var(--header-blue); display: flex; align-items: center; padding: 0 10px; z-index: 5; }
        #log-window { flex: 1; font-size: 14px; font-weight: bold; color: #fff; margin-left: 10px; }
    </style>
</head>
<body>
<div id="game-container">
    <header><div>Gold: <span id="gold-val">10,000</span></div><div>BABEL: THE ASCENSION</div></header>
    <main id="view-area">
        <section id="tab-roster" class="tab-content active">
            <div class="roster-grid" id="roster-list"></div>
            <div class="scroll-margin"></div>
        </section>
        <section id="tab-party" class="tab-content">
            <h3 style="color:var(--acc); font-size:14px;">現在の部隊編成</h3>
            <div id="party-preview" class="party-container" style="position:relative; height:240px; border:1px dashed #444;"></div>
            <div class="scroll-margin"></div>
        </section>
        <section id="tab-dungeon" class="tab-content" style="text-align:center; padding-top:50px;">
            <button class="nav-btn" style="width:200px; height:80px; font-size:18px; border:2px solid var(--acc);" onclick="startExpedition()">探索開始</button>
        </section>
        <section id="tab-exploring" class="tab-content" style="padding:0; overflow:hidden;">
            <div class="explore-header"><div id="log-window">探索を開始しました...</div></div>
            <div style="height:60%; display:flex; align-items:center; justify-content:center; font-size:20px; color:#333;">DUNGEON VIEW</div>
            <div class="party-container" id="battle-party"></div>
        </section>
    </main>
    <nav id="base-nav">
        <button id="nav-roster" class="nav-btn active" onclick="showTab('roster')">騎士団</button>
        <button id="nav-party" class="nav-btn" onclick="showTab('party')">編成</button>
        <button id="nav-dungeon" class="nav-btn" onclick="showTab('dungeon')">探索</button>
    </nav>
</div>
<script>
// 画像準拠の20名データ
const ROSTER = [
    {id:1, n:"グラディウス", c:"パラディン"}, {id:2, n:"ヴァレリア", c:"ソードマスター"},
    {id:3, n:"バルド", c:"バーサーカー"}, {id:4, n:"セレネ", c:"デュアルブレイド"},
    {id:5, n:"レイス", c:"シーフ"}, {id:6, n:"リュカ", c:"アーチャー"},
    {id:7, n:"アルベルト", c:"デュエリスト"}, {id:8, n:"カエデ", c:"ファイター"},
    {id:9, n:"ジーク", c:"ウィザード"}, {id:10, n:"エリア", c:"クレリック"},
    {id:11, n:"ラウル", c:"ソーサラー"}, {id:12, n:"ミラ", c:"サポート"},
    {id:13, n:"キリガ", c:"アサシン"}, {id:14, n:"リリス", c:"アサシン"},
    {id:15, n:"ゼイン", c:"ダークナイト"}, {id:16, n:"イザナ", c:"ブラッドナイト"},
    {id:17, n:"ギル", c:"ガンナー"}, {id:18, n:"クロノ", c:"タイムメイジ"},
    {id:19, n:"フィオナ", c:"ドラグーン"}, {id:20, n:"アベル", c:"イレイザー"}
];
let party = [1, 2, 3, 4, 5, 6]; 

function renderRoster() {
    document.getElementById('roster-list').innerHTML = ROSTER.map(u => `
        <div class="unit-card ${party.includes(u.id)?'in-party':''}" onclick="toggleMember(${u.id})">
            <span class="id-num">${String(u.id).padStart(2,'0')}</span>
            <div class="info-box">
                <span class="name">${u.n}</span>
                <span class="class-name">${u.c}</span>
                <span class="lv-info">Lv.1</span>
            </div>
        </div>`).join('');
}

function toggleMember(id) {
    const idx = party.indexOf(id);
    if(idx !== -1) party.splice(idx, 1);
    else if(party.length < 6) party.push(id);
    renderRoster();
}

function renderParty(tid) {
    const area = document.getElementById(tid);
    const row1 = party.slice(0,3), row2 = party.slice(3,6);
    const mCard = (id) => {
        const u = ROSTER.find(x => x.id === id);
        return u ? `<div class="unit-mini-card"><div class="name-tag">${u.n}</div><div class="hp-bar"><div class="hp-fill"></div></div></div>` : `<div class="unit-mini-card" style="opacity:0.2"></div>`;
    };
    area.innerHTML = `<div class="unit-row">${mCard(row1[0])}${mCard(row1[1])}${mCard(row1[2])}</div>
                      <div class="unit-row">${mCard(row2[0])}${mCard(row2[1])}${mCard(row2[2])}</div>`;
}

function showTab(id) {
    document.querySelectorAll('.tab-content, .nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    document.getElementById('nav-'+id).classList.add('active');
    if(id==='roster') renderRoster();
    if(id==='party') renderParty('party-preview');
}

function startExpedition() {
    document.querySelector('header').style.display = 'none';
    document.getElementById('base-nav').style.display = 'none';
    document.getElementById('game-container').style.gridTemplateRows = '1fr';
    showTab('exploring'); renderParty('battle-party');
}

renderRoster();
</script>
</body>
</html>
