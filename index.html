<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION</title>
    <style>
        :root { --bg: #050505; --panel: #1a1a1a; --acc: #ffd700; --hp: #ff4d4d; --dex: #4da6ff; --msg: #001a33; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        #game-container { width: 100%; max-width: 500px; height: 100%; display: grid; grid-template-rows: 50px 1fr 180px 100px; border: 2px solid #333; }
        header { background: #222; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--acc); font-size: 12px; }
        #main-stage { position: relative; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #floor-info { position: absolute; top: 10px; left: 10px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px 10px; z-index: 5; }
        #enemy-display { width: 180px; text-align: center; margin-bottom: 10px; z-index: 10; min-height: 50px; }
        #party-tray { background: #000; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; border-top: 1px solid #444; }
        .member-card { background: #111; border: 1px solid #333; height: 85px; display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .member-card.is-leader { border: 1.5px solid var(--acc); }
        .char-img { width: 100%; height: 50px; background: #222; object-fit: cover; }
        .hp-bar { width: 100%; height: 5px; background: #333; position: absolute; bottom: 5px; }
        .hp-fill { height: 100%; background: var(--hp); }
        .ct-bar { width: 100%; height: 2px; background: #000; position: absolute; bottom: 0; }
        .ct-fill { height: 100%; background: var(--dex); }
        #message-window { background: var(--msg); border-top: 2px solid #06c; padding: 8px; font-size: 11px; overflow-y: auto; }
        .btn-action { background: #850; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
<div id="game-container">
    <header><div>Gold: 15,052,073G</div><div>勲章: 111</div></header>
    <div id="main-stage">
        <div id="floor-info">F<span id="txt-floor">1</span> <span id="txt-meter">0</span>m</div>
        <div id="enemy-display"></div>
        <div style="text-align:center;">
            <h2 id="stage-name" style="margin:0; color:var(--dex);">世界灯台</h2>
            <div id="floor-name" style="font-size:24px; font-weight:bold;">1 階</div>
        </div>
        <button class="btn-action" id="start-btn" style="margin-top:20px">探索開始</button>
    </div>
    <div id="party-tray"></div>
    <div id="message-window">解放の騎士団、スタンバイ完了。</div>
</div>

<script>
// 全20キャラデータ（PS/AS/LS/画像を統合）
const KNIGHTS_MASTER = [
    { id: 1, name: "グラディウス", hp: 3500, atk: 120, def: 250, dex: 300, chance: 20, maxCt: 5, as: "不落の守護", ps: "重鎖の加護", ls: "全体のDEF+20%" },
    { id: 2, name: "ヴァレリア", hp: 2200, atk: 280, def: 120, dex: 950, chance: 35, maxCt: 4, as: "迅雷閃", ps: "迅雷の加護", ls: "全体のDEX+15%" },
    { id: 3, name: "バルド", hp: 3000, atk: 350, def: 150, dex: 400, chance: 25, maxCt: 6, as: "ブラッドレイジ", ps: "不死の呪い", ls: "全体のATK+20%" },
    { id: 4, name: "セレネ", hp: 2100, atk: 260, def: 110, dex: 850, chance: 30, maxCt: 3, as: "双刃乱舞", ps: "孤高の剣姫", ls: "DEX+20%" },
    { id: 5, name: "レイス", hp: 2000, atk: 230, def: 100, dex: 900, chance: 40, maxCt: 5, as: "影縫い", ps: "潜伏の極意", ls: "回避率+10%" },
    { id: 6, name: "リュカ", hp: 2300, atk: 300, def: 120, dex: 700, chance: 25, maxCt: 5, as: "必中の矢", ps: "森との一体化", ls: "クリ率+15%" },
    { id: 7, name: "アルベルト", hp: 2400, atk: 270, def: 130, dex: 800, chance: 30, maxCt: 4, as: "残像剣", ps: "残光の歩法", ls: "DEX+15%" },
    { id: 8, name: "カエデ", hp: 2500, atk: 320, def: 140, dex: 600, chance: 25, maxCt: 5, as: "紅蓮脚", ps: "紅蓮の舞", ls: "ATK+15%" },
    { id: 9, name: "ジーク", hp: 2200, atk: 400, def: 100, dex: 500, chance: 20, maxCt: 7, as: "虚空の理", ps: "闇の支配", ls: "全AS率+5%" },
    { id: 10, name: "エリア", hp: 2100, atk: 100, def: 130, dex: 550, chance: 30, maxCt: 5, as: "聖祈", ps: "聖職者の慈愛", ls: "最大HP+20%" },
    { id: 11, name: "ラウル", hp: 2200, atk: 380, def: 110, dex: 450, chance: 20, maxCt: 6, as: "禁書の呪い", ps: "禁忌の知識", ls: "スキル威力+20%" },
    { id: 12, name: "ミラ", hp: 2400, atk: 120, def: 140, dex: 500, chance: 20, maxCt: 8, as: "幻晶の盾", ps: "幻の水晶", ls: "全被ダメ10%減" },
    { id: 13, name: "キリガ", hp: 2100, atk: 340, def: 110, dex: 880, chance: 25, maxCt: 5, as: "無音殺", ps: "影の処刑人", ls: "ATK+20%" },
    { id: 14, name: "リリス", hp: 2200, atk: 250, def: 120, dex: 600, chance: 30, maxCt: 5, as: "毒華の香", ps: "美しき毒", ls: "異常付与+15%" },
    { id: 15, name: "ゼイン", hp: 3200, atk: 330, def: 160, dex: 400, chance: 25, maxCt: 6, as: "夜喰らい", ps: "与ダメ吸収", ls: "吸血効果+10%" },
    { id: 16, name: "イザナ", hp: 2800, atk: 360, def: 140, dex: 500, chance: 25, maxCt: 6, as: "血契の抱擁", ps: "低HP時ATK2倍", ls: "ATK+25%" },
    { id: 17, name: "ギル", hp: 3300, atk: 280, def: 200, dex: 350, chance: 15, maxCt: 6, as: "機装砲", ps: "確率完全防御", ls: "DEF+25%" },
    { id: 18, name: "クロノ", hp: 2200, atk: 200, def: 110, dex: 400, chance: 15, maxCt: 8, as: "時渡り", ps: "全体CT減少", ls: "CT速度UP" },
    { id: 19, name: "フィオナ", hp: 3800, atk: 310, def: 180, dex: 450, chance: 20, maxCt: 6, as: "竜の咆哮", ps: "怯み無効", ls: "最大HP+30%" },
    { id: 20, name: "アベル", hp: 2500, atk: 450, def: 130, dex: 700, chance: 12, maxCt: 7, as: "零界", ps: "理無効化", ls: "全ステ+10%" }
];

const MID_BOSSES = ["スケルトンロード", "ソウルイーター", "ヒュドラ", "オーガキング", "デーモンクイーン", "古代の守護者", "アイ・オブ・カオス", "シャドウドラゴン"];

let party = KNIGHTS_MASTER.slice(0, 5).map(k => ({...k, curHp: k.hp, curCt: 0, isLeader: false}));
party[0].isLeader = true;
let floor = 1, meter = 0, isBattle = false;

function render() {
    document.getElementById('txt-floor').innerText = floor;
    document.getElementById('txt-meter').innerText = meter;
    document.getElementById('floor-name').innerText = `${floor} 階`;
    const tray = document.getElementById('party-tray');
    tray.innerHTML = party.map((u, i) => `
        <div class="member-card ${u.isLeader ? 'is-leader' : ''}" onclick="selectL(${i})">
            <img src="No.${String(u.id).padStart(2, '0')}.png" class="char-img" onerror="this.src='https://via.placeholder.com/50?text=No.${u.id}'">
            <div style="font-size:9px; text-align:center;"><b>${u.name}</b></div>
            <div class="hp-bar"><div class="hp-fill" style="width:${(u.curHp/u.hp)*100}%"></div></div>
            <div class="ct-bar"><div class="ct-fill" style="width:${(u.curCt/u.maxCt)*100}%"></div></div>
        </div>`).join('');
}

function selectL(idx) { if(!isBattle) { party.forEach((p, i) => p.isLeader = (i === idx)); render(); } }

async function startDungeon() {
    document.getElementById('start-btn').style.display = 'none';
    isBattle = true;
    while(floor <= 100 && party.some(p => p.curHp > 0)) {
        for(meter = 0; meter <= 100; meter += 20) {
            render();
            if(meter === 100) await doBattle();
            else await new Promise(r => setTimeout(r, 200));
        }
        floor++; meter = 0;
    }
    isBattle = false; document.getElementById('start-btn').style.display = 'block';
}

async function doBattle() {
    let eName = (floor % 10 === 0) ? MID_BOSSES[(floor/10-1)%8] : "モンスター";
    let e = { name: eName, hp: floor * 500, curHp: floor * 500, atk: floor * 20 };
    document.getElementById('enemy-display').innerHTML = `<b>${e.name}</b>`;
    
    while(e.curHp > 0 && party.some(p => p.curHp > 0)) {
        for(let p of party.filter(u => u.curHp > 0)) {
            if(p.curCt === 0 && Math.random()*100 < p.chance) {
                e.curHp -= p.atk * 2; p.curCt = p.maxCt;
                document.getElementById('message-window').innerText = `> ${p.name}: ${p.as}!`;
            } else {
                e.curHp -= p.atk; if(p.curCt > 0) p.curCt--;
            }
            if(e.curHp <= 0) break;
            await new Promise(r => setTimeout(r, 100)); render();
        }
    }
    document.getElementById('enemy-display').innerHTML = "";
}

document.getElementById('start-btn').onclick = startDungeon;
render();
</script>
</body>
</html>
