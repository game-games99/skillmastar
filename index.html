<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKILL MASTER - 終焉の塔 -</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --primary: #38bdf8; --accent: #fbbf24; --danger: #ef4444;
            --hp: #10b981; --mp: #6366f1;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; font-size: 14px; }
        #game-layout { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 768px) { #game-layout { grid-template-columns: 350px 1fr; } }

        .card { background: var(--panel); border-radius: 12px; padding: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .full { grid-column: 1 / -1; }

        /* Gauges */
        .g-wrap { width: 100%; background: #0f172a; height: 18px; border-radius: 9px; margin: 5px 0; overflow: hidden; position: relative; border: 1px solid #475569; }
        .g-bar { height: 100%; transition: width 0.3s; }
        .g-txt { position: absolute; width: 100%; text-align: center; font-size: 10px; line-height: 18px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        /* Equipment (4 slots) */
        .eq-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .eq-item { background: #334155; padding: 8px; border-radius: 6px; font-size: 11px; border: 1px solid #475569; }
        .quality { color: var(--accent); font-weight: bold; }

        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 10px; border: none; background: #334155; color: #94a3b8; cursor: pointer; border-radius: 6px; transition: 0.2s; font-size: 13px; }
        .tab.active { background: var(--primary); color: white; font-weight: bold; }

        .log { height: 350px; overflow-y: auto; background: #020617; border-radius: 8px; padding: 10px; font-size: 13px; line-height: 1.6; border: 1px solid #334155; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #0284c7; }
        .btn-main:active { transform: translateY(2px); box-shadow: none; }
        
        .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .skill-node { padding: 10px; background: #1e293b; border: 2px solid #334155; border-radius: 8px; font-size: 11px; }
        .skill-node.owned { border-color: var(--accent); background: #334155; }
        
        /* Start Screen Optimized for Mobile */
        #start-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; text-align: center;
        }
        .start-title { font-size: clamp(40px, 10vw, 64px); color: var(--primary); margin: 0; font-weight: 900; letter-spacing: -1px; }
        .start-sub { color: #94a3b8; font-size: 18px; margin-top: 10px; margin-bottom: 30px; }
        .job-select-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .btn-job { 
            padding: 25px 10px; background: #334155; color: white; border: none; 
            border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; 
            transition: 0.2s; border-bottom: 4px solid #1e293b;
        }
        .btn-job:active { transform: translateY(2px); border-bottom-width: 2px; background: var(--primary); }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 class="start-title">SKILL MASTER</h1>
    <p class="start-sub">初期ジョブを選択してください</p>
    <div class="job-select-container">
        <button class="btn-job" onclick="gameInit('Warrior')">戦士</button>
        <button class="btn-job" onclick="gameInit('Mage')">魔術師</button>
        <button class="btn-job" onclick="gameInit('Thief')">盗賊</button>
        <button class="btn-job" onclick="gameInit('Cleric')">聖職者</button>
    </div>
</div>

<div id="game-layout" style="display:none;">
    <div class="card">
        <h2 id="job-name" style="margin:0; color:var(--primary); font-size: 24px;">---</h2>
        <div id="lv-disp" style="font-size: 16px; margin-bottom: 10px;">Lv.1 / 1F</div>
        
        <div class="g-wrap"><div id="hp-bar" class="g-bar" style="background:var(--hp);"></div><div id="hp-txt" class="g-txt"></div></div>
        <div class="g-wrap"><div id="mp-bar" class="g-bar" style="background:var(--mp);"></div><div id="mp-txt" class="g-txt"></div></div>
        
        <div id="stats-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size: 14px; margin: 15px 0;"></div>
        
        <div style="font-size: 14px; font-weight: bold; border-top: 1px solid #334155; padding-top: 10px;">装備 (4枠)</div>
        <div class="eq-list" id="eq-ui"></div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h3 id="target-name" style="margin:0; color:var(--danger); font-size: 20px;">索敵中...</h3>
            <span id="floor-effect" style="font-size: 12px; color:var(--accent);"></span>
        </div>
        <div id="target-info" style="font-size: 12px; margin: 8px 0;"></div>
        <div class="g-wrap"><div id="e-hp-bar" class="g-bar" style="background:var(--danger);"></div><div id="e-hp-txt" class="g-txt"></div></div>
        <div class="log" id="log"></div>
        <button class="btn-main" onclick="tick()">塔を攻略する</button>
    </div>

    <div class="card full">
        <div class="tabs">
            <button id="t-skill" class="tab active" onclick="tab('skill')">スキル図鑑</button>
            <button id="t-job" class="tab" onclick="tab('job')">転職・クラスチェンジ</button>
        </div>
        <div id="v-skill"><div class="skill-grid" id="skill-list"></div></div>
        <div id="v-job" style="display:none;"><div id="job-list"></div></div>
    </div>
</div>

<script>
// --- MASTER DATA ---
const ATTRIBUTES = ["火", "水", "風", "地", "光", "闇"];
const RACES = ["獣", "亜人", "死霊", "魔族", "竜", "精霊", "昆虫", "機械", "天使", "幻獣"];
const JOBS = {
    "Warrior": { name: "戦士", bonus: {atk:1.2, def:1.2, hp:1.5, mp:0.5}, next: ["Knight", "Berserker"] },
    "Mage": { name: "魔術師", bonus: {atk:0.7, def:0.7, hp:0.8, mp:2.5}, next: ["Wizard", "Sage"] },
    "Thief": { name: "盗賊", bonus: {atk:1.1, def:0.8, hp:1.0, mp:1.0}, next: ["Assassin", "Ninja"] },
    "Cleric": { name: "聖職者", bonus: {atk:0.8, def:1.3, hp:1.3, mp:1.8}, next: ["Paladin", "Bishop"] },
    "Knight": { name: "騎士", bonus: {atk:1.5, def:2.0, hp:2.0, mp:1.0}, req: 40 },
    "Berserker": { name: "狂戦士", bonus: {atk:3.0, def:0.4, hp:1.8, mp:0.4}, req: 40 }
};

const SKILL_DB = Array.from({length: 200}, (_, i) => ({
    id: i+1,
    name: `スキル No.${i+1}`,
    type: i % 3 === 0 ? "Active" : "Passive",
    rate: 10 + (i % 20),
    mp: 10 + Math.floor(i/2),
    atkMul: 1.5 + (i * 0.05),
    reqKills: i * 5,
    desc: i % 3 === 0 ? "攻撃時に確率で倍撃" : "常時ステータス上昇"
}));

// --- STATE ---
let p = {
    job: "Warrior", lv: 1, exp: 0, f: 1, prg: 0, k: 0, 
    hp: 0, mp: 0,
    base: { hp: 300, mp: 100, atk: 40, def: 30, spd: 20, hit: 90, eva: 10 },
    attr: [10, 10, 10, 10, 10, 10], res: [5, 5, 5, 5, 5, 5],
    eq: { 武器: {n:"錆びた剣", v:10, q:50}, 防具: {n:"布の服", v:10, q:50}, アクセ1: {n:"石の指輪", v:5, q:50}, アクセ2: {n:"古い守り", v:5, q:50} },
    skills: [1]
};
let enemy = null;

function getStats() {
    const j = JOBS[p.job];
    const e = p.eq;
    let eqAtk = (e.武器.v * e.武器.q/100) + (e.アクセ1.v * e.アクセ1.q/100);
    let eqDef = (e.防具.v * e.防具.q/100) + (e.アクセ2.v * e.アクセ2.q/100);
    return {
        mHp: Math.floor(p.base.hp * j.bonus.hp),
        mMp: Math.floor(p.base.mp * j.bonus.mp),
        atk: Math.floor((p.base.atk + eqAtk) * j.bonus.atk),
        def: Math.floor((p.base.def + eqDef) * j.bonus.def),
        spd: Math.floor(p.base.spd),
        hit: p.base.hit, eva: p.base.eva
    };
}

function gameInit(job) {
    p.job = job;
    const s = getStats(); p.hp = s.mHp; p.mp = s.mMp;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-layout').style.display = 'grid';
    refresh();
}

function tick() {
    const s = getStats();
    if (!enemy) {
        const isBoss = (p.prg >= p.f);
        const mul = 1 + (p.f * 0.5);
        const race = RACES[Math.floor(Math.random() * 10)];
        enemy = {
            n: isBoss ? `${p.f}F 階層守護者` : `${race}の兵士`,
            hp: Math.floor((isBoss ? 2000 : 300) * mul),
            mHp: Math.floor((isBoss ? 2000 : 300) * mul),
            atk: Math.floor((isBoss ? 80 : 40) * mul),
            def: Math.floor((isBoss ? 60 : 25) * mul),
            exp: Math.floor(100 * mul), isBoss
        };
        log(`${enemy.n}が現れた！`); refresh(); return;
    }

    let dmg = Math.max(1, s.atk - enemy.def);
    p.skills.forEach(sid => {
        const sk = SKILL_DB[sid-1];
        if (sk.type === "Active" && Math.random() * 100 < sk.rate && p.mp >= sk.mp) {
            p.mp -= sk.mp; dmg = Math.floor(dmg * sk.atkMul);
            log(`スキル【${sk.name}】発動！ ${dmg}ダメージ！`, "var(--accent)");
        }
    });
    enemy.hp -= dmg;
    
    if (enemy.hp <= 0) {
        log(`${enemy.n}を討伐。`, "var(--hp)");
        p.k++; p.exp += enemy.exp;
        if (enemy.isBoss) { p.f++; p.prg = 0; log(`✨ ${p.f-1}F 踏破！`, "var(--accent)"); }
        else { p.prg++; }
        if (p.exp >= p.lv * 150) levelUp();
        checkSkills(); enemy = null; drop(); refresh(); return;
    }

    let edmg = Math.max(1, enemy.atk - s.def);
    if (Math.random() * 100 > s.eva) {
        p.hp -= edmg;
        log(`${enemy.n}の攻撃！ ${edmg}のダメージ！`, "var(--danger)");
    } else {
        log("攻撃を回避した！", "var(--primary)");
    }

    if (p.hp <= 0) {
        log("敗北... 1つ前の階層に戻ります。", "var(--danger)");
        p.f = Math.max(1, p.f - 1); p.prg = 0;
        p.hp = s.mHp; p.mp = s.mMp; enemy = null;
    }
    refresh();
}

function levelUp() {
    p.lv++; p.exp = 0;
    p.base.hp += Math.floor(Math.random() * 50) + 30;
    p.base.mp += Math.floor(Math.random() * 20) + 10;
    p.base.atk += Math.floor(Math.random() * 8) + 4;
    p.base.def += Math.floor(Math.random() * 6) + 3;
    p.base.spd += Math.floor(Math.random() * 4) + 2;
    p.base.hit += Math.floor(Math.random() * 2) + 1;
    log(`🌟 レベルアップ！ Lv.${p.lv} に到達。`, "var(--accent)");
}

function drop() {
    if (Math.random() > 0.3) return;
    const keys = Object.keys(p.eq);
    const slot = keys[Math.floor(Math.random() * keys.length)];
    const q = Math.floor(Math.random() * 100) + 1;
    const v = 10 + (p.f * 5);
    if (v * q/100 > p.eq[slot].v * p.eq[slot].q/100) {
        p.eq[slot] = { n: slot + "＋", v, q };
        log(`💎 装備獲得: [${slot}] 品質${q}%`, "var(--primary)");
    }
}

function checkSkills() {
    SKILL_DB.forEach(sk => {
        if (!p.skills.includes(sk.id) && p.k >= sk.reqKills) {
            p.skills.push(sk.id);
            log(`📜 スキル習得：${sk.name}`, "var(--accent)");
        }
    });
}

function refresh() {
    const s = getStats();
    document.getElementById('job-name').innerText = JOBS[p.job].name;
    document.getElementById('lv-disp').innerText = `Lv.${p.lv} / ${p.f}F`;
    document.getElementById('hp-bar').style.width = `${(p.hp/s.mHp)*100}%`;
    document.getElementById('hp-txt').innerText = `HP ${p.hp}/${s.mHp}`;
    document.getElementById('mp-bar').style.width = `${(p.mp/s.mMp)*100}%`;
    document.getElementById('mp-txt').innerText = `MP ${p.mp}/${s.mMp}`;
    
    document.getElementById('stats-grid').innerHTML = `
        <div>ATK: ${s.atk}</div><div>DEF: ${s.def}</div>
        <div>SPD: ${s.spd}</div><div>HIT: ${s.hit}%</div>
        <div>EVA: ${s.eva}%</div><div>KILLS: ${p.k}</div>
    `;

    const eqUi = document.getElementById('eq-ui'); eqUi.innerHTML = "";
    Object.entries(p.eq).forEach(([slot, item]) => {
        eqUi.innerHTML += `<div class="eq-item">${slot}<br><strong>${item.n}</strong><br><span class="quality">品質 ${item.q}%</span></div>`;
    });

    if (enemy) {
        document.getElementById('e-hp-bar').style.width = `${(enemy.hp/enemy.mHp)*100}%`;
        document.getElementById('e-hp-txt').innerText = `${enemy.hp}/${enemy.mHp}`;
        document.getElementById('target-info').innerText = `ATK:${enemy.atk} DEF:${enemy.def}`;
    } else {
        document.getElementById('e-hp-bar').style.width = `0%`;
        document.getElementById('e-hp-txt').innerText = `- / -`;
    }
}

function tab(t) {
    document.querySelectorAll('[id^="v-"]').forEach(v => v.style.display='none');
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById(`v-${t}`).style.display='block';
    document.getElementById(`t-${t}`).classList.add('active');
    
    if(t === 'skill') {
        const list = document.getElementById('skill-list'); list.innerHTML = "";
        SKILL_DB.forEach(sk => {
            const owned = p.skills.includes(sk.id);
            list.innerHTML += `<div class="skill-node ${owned?'owned':''}">
                <strong>${owned?sk.name:'？？？'}</strong><br>
                <small>${owned?sk.desc:'条件：討伐数 '+sk.reqKills}</small>
            </div>`;
        });
    }
}

function log(m, c) {
    const w = document.getElementById('log');
    w.innerHTML += `<div style="color:${c||'#f8fafc'}">${m}</div>`;
    w.scrollTop = w.scrollHeight;
}
</script>
</body>
</html>
