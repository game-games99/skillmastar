<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION v1.36</title>
    <style>
        :root { --bg: #050505; --panel: #002244; --acc: #C5A059; --hp-bg: #111; --hp-fill: #4caf50; --header-blue: #003366; }
        body { background: #000; color: #e0e0e0; font-family: 'Noto Sans JP', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        #game-container { width: 100%; max-width: 600px; height: 100%; display: grid; grid-template-rows: 1fr 60px; position: relative; }
        
        /* 拠点用ヘッダー（探索中は隠す） */
        header { background: #222; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--acc); font-size: 14px; height: 50px; }
        
        #view-area { position: relative; overflow: hidden; background: #000; }
        nav { background: #222; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; height: 60px; }
        .nav-btn { background: #333; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: var(--acc); color: #000; }

        .tab-content { display: none; padding: 10px; height: 100%; box-sizing: border-box; }
        .tab-content.active { display: block; }

        /* --- 探索・戦闘UI再現 --- */
        #tab-exploring { padding: 0; background: #000; position: relative; }
        
        /* 上部ログ・進捗エリア */
        .explore-header { 
            position: absolute; top: 0; left: 0; width: 100%; height: 80px;
            background: var(--header-blue); display: flex; align-items: center; padding: 0 10px; z-index: 10;
        }
        .floor-circle {
            width: 70px; height: 70px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.3); margin-right: 15px;
        }
        .floor-circle .f-num { font-size: 10px; opacity: 0.7; }
        .floor-circle .m-num { font-size: 24px; font-weight: bold; }
        
        #log-window { flex: 1; font-size: 16px; font-weight: bold; color: #fff; }

        /* 中央ビジュアルエリア */
        #visual-area {
            height: 60%; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, #111, #000); position: relative;
        }
        #visual-area img { max-width: 80%; max-height: 80%; display: none; z-index: 2; }
        #visual-area::after { content: ""; position: absolute; bottom: 15%; width: 60%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 50%; filter: blur(5px); }

        /* 下部ユニットエリア */
        .party-container {
            position: absolute; bottom: 0; width: 100%; height: 40%;
            background: #000; display: flex; flex-direction: column; gap: 5px; padding: 5px; box-sizing: border-box;
        }
        .unit-row { display: flex; justify-content: center; gap: 5px; flex: 1; }
        .unit-mini-card { 
            flex: 1; max-width: 110px; background: var(--panel); border: 1px solid #004488; 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .unit-mini-card .name-tag { background: #003366; font-size: 10px; text-align: center; padding: 2px; }
        .unit-mini-card img { width: 100%; height: 60px; object-fit: cover; }
        .unit-mini-card .hp-val { font-size: 9px; text-align: right; padding-right: 2px; }
        .unit-mini-card .hp-bar-bg { background: var(--hp-bg); height: 6px; margin: 2px; border: 1px solid #333; }
        .unit-mini-card .hp-bar-fill { height: 100%; background: var(--hp-fill); width: 100%; }

        .choice-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; display: none; }
    </style>
</head>
<body>
<div id="game-container">
    <header id="base-header">
        <div id="gold-display">Gold: 0</div>
        <div id="floor-info">Babel HQ</div>
    </header>

    <main id="view-area">
        <section id="tab-roster" class="tab-content active">騎士団リスト...</section>
        <section id="tab-party" class="tab-content">部隊編成...</section>
        <section id="tab-dungeon" class="tab-content">
            <button class="nav-btn" style="padding:20px;" onclick="startExpedition()">探索開始</button>
        </section>

        <section id="tab-exploring" class="tab-content">
            <div class="explore-header">
                <div class="floor-circle">
                    <span class="f-num" id="txt-floor-cur">F63</span>
                    <span class="m-num" id="txt-meter-cur">0m</span>
                </div>
                <div id="log-window">探索待機中</div>
            </div>

            <div id="visual-area">
                <img id="enemy-img" src="">
                <img id="chest-img" src="">
            </div>

            <div class="party-container" id="party-display-area">
                </div>

            <div id="branch-choice" class="choice-overlay">
                <h2 style="color:var(--acc);">帰還しますか？</h2>
                <button class="nav-btn" style="width:200px; margin-bottom:10px;" onclick="handleChoice(true)">進む</button>
                <button class="nav-btn" style="width:200px;" onclick="handleChoice(false)">帰還</button>
            </div>
        </section>
    </main>

    <nav id="base-nav">
        <button id="nav-roster" class="nav-btn active" onclick="showTab('roster')">騎士団</button>
        <button id="nav-party" class="nav-btn" onclick="showTab('party')">編成</button>
        <button id="nav-dungeon" class="nav-btn" onclick="showTab('dungeon')">探索</button>
    </nav>
</div>

<script>
const ROSTER_DATA = [
    { id:1, name:"ドゥーガルド", hp:2362, maxHp:2362, dex:30 },
    { id:2, name:"クローディア", hp:2984, maxHp:2984, dex:65 },
    { id:3, name:"キャス", hp:1785, maxHp:1785, dex:25 },
    { id:4, name:"アヤメ", hp:2117, maxHp:2117, dex:75 },
    { id:5, name:"カルロス", hp:2323, maxHp:2323, dex:85 }
];

let gold = 10000n;
let isExploring = false;
let floor = 63;
let meter = 0;

function renderBattleParty() {
    const area = document.getElementById('party-display-area');
    // スクショ通り3名+2名の構成
    const row1 = ROSTER_DATA.slice(0, 3);
    const row2 = ROSTER_DATA.slice(3, 5);

    const makeRow = (units) => `
        <div class="unit-row">
            ${units.map(u => `
                <div class="unit-mini-card">
                    <div class="name-tag">${u.name}</div>
                    <img src="No.${u.id}.png" onerror="this.src='https://via.placeholder.com/100?text=UNIT'">
                    <div class="hp-val">${u.hp}/${u.maxHp}</div>
                    <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${(u.hp/u.maxHp)*100}%"></div></div>
                </div>
            `).join('')}
        </div>`;
    
    area.innerHTML = makeRow(row1) + makeRow(row2);
}

function showTab(id) {
    if (isExploring) return;
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${id}`).classList.add('active');
}

function startExpedition() {
    isExploring = true;
    meter = 0;
    document.getElementById('base-header').style.display = 'none';
    document.getElementById('base-nav').style.display = 'none';
    document.getElementById('game-container').style.gridTemplateRows = '1fr';
    
    showTab('exploring');
    renderBattleParty();
    log("探索を開始しました");
    loop();
}

async function loop() {
    while(isExploring) {
        meter++;
        document.getElementById('txt-meter-cur').innerText = `${meter}m`;
        document.getElementById('txt-floor-cur').innerText = `F${floor}`;

        const r = Math.random();
        if(r < 0.1) await encounter();
        else if(r < 0.15) log("宝箱を見つけた！");

        await new Promise(res => setTimeout(res, 400));
        if(meter >= 20) {
            document.getElementById('branch-choice').style.display = 'flex';
            return;
        }
    }
}

async function encounter() {
    const enemyImg = document.getElementById('enemy-img');
    enemyImg.src = "ghost.png"; // イメージ
    enemyImg.style.display = 'block';
    log("LV19ゴーストが現れた！");
    await new Promise(res => setTimeout(res, 1000));
    enemyImg.style.display = 'none';
    log("ゴーストを撃破！");
}

function log(m) {
    document.getElementById('log-window').innerText = m;
}

function handleChoice(proceed) {
    document.getElementById('branch-choice').style.display = 'none';
    if(!proceed) {
        isExploring = false;
        document.getElementById('base-header').style.display = 'flex';
        document.getElementById('base-nav').style.display = 'grid';
        document.getElementById('game-container').style.gridTemplateRows = '50px 1fr 60px';
        showTab('roster');
    } else {
        meter = 0;
        loop();
    }
}
</script>
</body>
</html>
