<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION</title>
    <style>
        :root { --bg: #050505; --panel: #1a1a1a; --acc: #ffd700; --hp: #ff4d4d; --dex: #4da6ff; --msg: #001a33; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        #game-container { width: 100%; max-width: 500px; height: 100%; display: grid; grid-template-rows: 60px 1fr 180px 100px; border: 2px solid #333; }
        
        header { background: #222; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--acc); font-size: 13px; }
        #main-stage { position: relative; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* 下段パーティエリア：画像9の再現 */
        #party-tray { background: #000; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; border-top: 1px solid #444; }
        .member-card { background: #111; border: 1px solid #333; position: relative; height: 85px; display: flex; flex-direction: column; }
        .char-img { width: 100%; height: 50px; background: #222; object-fit: cover; }
        .char-info { padding: 2px; font-size: 10px; text-align: center; }
        
        .hp-bar { width: 100%; height: 4px; background: #333; position: absolute; bottom: 4px; }
        .hp-fill { height: 100%; background: var(--hp); transition: width 0.2s; }
        .ct-bar { width: 100%; height: 2px; background: #000; position: absolute; bottom: 0; }
        .ct-fill { height: 100%; background: var(--dex); transition: width 0.3s; }

        #message-window { background: var(--msg); border-top: 2px solid #06c; padding: 8px; font-size: 11px; overflow-y: auto; }
        .btn-action { background: #850; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #enemy-box { width: 180px; padding: 10px; background: rgba(50,0,0,0.8); border: 2px solid #800; text-align: center; margin-bottom: 10px; z-index: 10; }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div>Gold: 15,052,073G</div>
        <button onclick="alert('部隊編成画面へ（未実装）')">部隊編成</button>
    </header>

    <div id="main-stage">
        <div id="enemy-box" style="display:none"></div>
        <h2 id="stage-title" style="color:var(--acc)">世界灯台 25階</h2>
        <button class="btn-action" id="start-btn">ダンジョンへ</button>
    </div>

    <div id="party-tray" id="party-list"></div>

    <div id="message-window" id="log">
        準備完了。部隊は待機しています。
    </div>
</div>

<script>
// 解放の騎士団：全20名データ（画像とスキル・確率・CTを統合）
const KNIGHTS = [
    { id: 1, name: "グラディウス", chance: 20, maxCt: 5, atk: 120, def: 200, dex: 300, hp: 2600, img: "https://via.placeholder.com/150/222/fff?text=01" },
    { id: 2, name: "ヴァレリア", chance: 30, maxCt: 4, atk: 180, def: 100, dex: 900, hp: 2000, img: "https://via.placeholder.com/150/222/fff?text=02" },
    { id: 3, name: "バルド", chance: 25, maxCt: 6, atk: 210, def: 150, dex: 400, hp: 2400, img: "https://via.placeholder.com/150/222/fff?text=03" },
    { id: 12, name: "ミラ", chance: 15, maxCt: 8, atk: 100, def: 150, dex: 450, hp: 2200, img: "https://via.placeholder.com/150/222/fff?text=12" },
    { id: 20, name: "アベル", chance: 10, maxCt: 7, atk: 250, def: 130, dex: 650, hp: 2300, img: "https://via.placeholder.com/150/222/fff?text=20" }
];

let party = KNIGHTS.map(k => ({...k, curHp: k.hp, curCt: 0}));
let enemy = null;

function addLog(m) {
    const l = document.getElementById('log');
    l.innerHTML = `> ${m}`;
}

function render() {
    const tray = document.getElementById('party-tray');
    tray.innerHTML = party.map(u => `
        <div class="member-card">
            <img src="${u.img}" class="char-img">
            <div class="char-info"><b>${u.name}</b></div>
            <div class="hp-bar"><div class="hp-fill" style="width:${(u.curHp/u.hp)*100}%"></div></div>
            <div class="ct-bar"><div class="ct-fill" style="width:${u.curCt > 0 ? (u.curCt/u.maxCt)*100 : 0}%"></div></div>
        </div>
    `).join('');

    if(enemy) {
        const eb = document.getElementById('enemy-box');
        eb.style.display = 'block';
        eb.innerHTML = `<b>${enemy.name}</b><div class="hp-bar" style="position:static; margin-top:5px; height:8px;"><div class="hp-fill" style="width:${(enemy.curHp/enemy.hp)*100}%"></div></div>`;
    }
}

async function startExploration() {
    document.getElementById('start-btn').style.display = 'none';
    enemy = { name: "灯台の守護者", hp: 6000, curHp: 6000, atk: 220, def: 120, dex: 400 };
    
    while(enemy.curHp > 0 && party.some(p => p.curHp > 0)) {
        const actors = [...party.filter(p => p.curHp > 0), enemy].sort((a,b) => b.dex - a.dex);
        
        for(let a of actors) {
            if(a.curHp <= 0 || (enemy && enemy.curHp <= 0 && a !== enemy)) continue;
            let t = (a === enemy) ? party.filter(p => p.curHp > 0)[0] : enemy;

            if(a !== enemy) {
                // スキル確率判定 (CTが0の時のみ)
                if(a.curCt === 0 && Math.random() * 100 < a.chance) {
                    let dmg = Math.floor(a.atk * 3);
                    t.curHp -= dmg;
                    a.curCt = a.maxCt; // スキル発動後にCT発生
                    addLog(`<span style="color:yellow">${a.name}の奥義発動！ ${dmg}ダメージ</span>`);
                } else {
                    let dmg = Math.max(1, a.atk - (t.def/2));
                    t.curHp -= dmg;
                    if(a.curCt > 0) a.curCt--; // 通常行動でCT減少
                    addLog(`${a.name}の攻撃: ${Math.floor(dmg)}点`);
                }
            } else {
                let edmg = Math.max(1, a.atk - (t.def/2));
                t.curHp -= edmg;
                addLog(`敵の反撃：${t.name}に${Math.floor(edmg)}の被害`);
            }
            render();
            await new Promise(r => setTimeout(r, 250));
            if(!enemy || enemy.curHp <= 0 || party.every(p => p.curHp <= 0)) break;
        }
    }
    
    addLog(enemy && enemy.curHp <= 0 ? "階層踏破！" : "撤退...");
    document.getElementById('start-btn').style.display = 'block';
}

document.getElementById('start-btn').onclick = startExploration;
render();
</script>
</body>
</html>
