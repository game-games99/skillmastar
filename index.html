<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION</title>
    <style>
        :root { --bg: #050505; --acc: #C5A059; --panel: #0a0a0a; --header-blue: #003366; }
        * { font-family: 'Times New Roman', serif; box-sizing: border-box; }
        body { background: #000; color: #e0e0e0; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        /* ゲーム全体コンテナ */
        #game-container { width: 100%; max-width: 600px; height: 100%; display: grid; grid-template-rows: 40px 1fr 30px; }
        
        /* 上部ナビゲーション（赤丸の指定場所） */
        nav { background: #111; display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--acc); height: 40px; }
        .nav-btn { background: transparent; color: #888; border: none; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .nav-btn.active { color: var(--acc); text-shadow: 0 0 5px var(--acc); }

        /* メイン表示エリア */
        #view-area { position: relative; overflow-y: auto; background: #000; padding: 5px; -webkit-overflow-scrolling: touch; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 騎士団: 横5×縦4の形式 */
        .roster-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); /* 横5列 */
            gap: 2px; 
            background: #000;
        }
        .unit-card { 
            background: var(--panel); border: 1px solid #222; padding: 3px; 
            aspect-ratio: 0.75; position: relative; 
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .unit-card.in-party { border-color: var(--acc); box-shadow: inset 0 0 10px rgba(197,160,89,0.2); }
        .unit-card .id-num { position: absolute; top: 1px; left: 2px; color: var(--acc); font-size: 8px; }
        .unit-card .name { font-size: 8px; color: #fff; line-height: 1; margin-bottom: 1px; white-space: nowrap; overflow: hidden; }
        .unit-card .class-name { color: var(--acc); font-size: 6px; transform: scale(0.9); transform-origin: left; display: block; }

        /* 下部情報バー（Goldとタイトルを縮小） */
        footer { background: #0a0a0a; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; font-size: 10px; color: #666; }

        /* 編成UI (6人制) */
        .party-view { width: 100%; height: 220px; border: 1px dashed #333; display: flex; flex-direction: column; gap: 2px; padding: 2px; margin-top: 10px; }
        .unit-row { display: flex; gap: 2px; flex: 1; }
        .mini-slot { flex: 1; background: #001122; border: 1px solid #002244; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; }

        /* 探索中 */
        .explore-screen { position: absolute; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; }
    </style>
</head>
<body>
<div id="game-container">
    <nav id="base-nav">
        <button id="nav-roster" class="nav-btn active" onclick="showTab('roster')">ROSTER</button>
        <button id="nav-party" class="nav-btn" onclick="showTab('party')">PARTY</button>
        <button id="nav-dungeon" class="nav-btn" onclick="showTab('dungeon')">EXPLORE</button>
    </nav>

    <main id="view-area">
        <section id="tab-roster" class="tab-content active">
            <div class="roster-grid" id="roster-list"></div>
        </section>

        <section id="tab-party" class="tab-content">
            <div id="party-edit" class="party-view"></div>
            <p style="font-size:10px; text-align:center; color:#555;">Select 6 members in Roster</p>
        </section>

        <section id="tab-dungeon" class="tab-content" style="text-align:center; padding-top:100px;">
            <button class="nav-btn" style="border:1px solid var(--acc); padding:20px 40px; color:var(--acc);" onclick="startExpedition()">BEGIN ASCENSION</button>
        </section>

        <div id="exploring-screen" class="explore-screen">
            <div style="background:var(--header-blue); padding:10px; font-size:12px;">探索中...</div>
            <div style="flex:1;"></div>
            <button class="nav-btn" onclick="stopExpedition()" style="height:40px; color:#600;">ABANDON</button>
        </div>
    </main>

    <footer>
        <div>Gold: 10,000</div>
        <div>BABEL: THE ASCENSION</div>
    </footer>
</div>

<script>
const ROSTER = [
    {id:1, n:"グラディウス", c:"パラディン"}, {id:2, n:"ヴァレリア", c:"ソードマスター"},
    {id:3, n:"バルド", c:"バーサーカー"}, {id:4, n:"セレネ", c:"デュアルブレイド"},
    {id:5, n:"レイス", c:"シーフ"}, {id:6, n:"リュカ", c:"アーチャー"},
    {id:7, n:"アルベルト", c:"デュエリスト"}, {id:8, n:"カエデ", c:"ファイター"},
    {id:9, n:"ジーク", c:"ウィザード"}, {id:10, n:"エリア", c:"クレリック"},
    {id:11, n:"ラウル", c:"ソーサラー"}, {id:12, n:"ミラ", c:"サポート"},
    {id:13, n:"キリガ", c:"アサシン"}, {id:14, n:"リリス", c:"アサシン"},
    {id:15, n:"ゼイン", c:"ダークナイト"}, {id:16, n:"イザナ", c:"ブラッドナイト"},
    {id:17, n:"ギル", c:"ガンナー"}, {id:18, n:"クロノ", c:"タイムメイジ"},
    {id:19, n:"フィオナ", c:"ドラグーン"}, {id:20, n:"アベル", c:"イレイザー"}
];
let party = [1, 2, 3, 4, 5, 6];

function renderRoster() {
    document.getElementById('roster-list').innerHTML = ROSTER.map(u => `
        <div class="unit-card ${party.includes(u.id)?'in-party':''}" onclick="toggleMember(${u.id})">
            <span class="id-num">${String(u.id).padStart(2,'0')}</span>
            <span class="name">${u.n}</span>
            <span class="class-name">${u.c}</span>
        </div>`).join('');
}

function toggleMember(id) {
    const idx = party.indexOf(id);
    if(idx !== -1) party.splice(idx, 1);
    else if(party.length < 6) party.push(id);
    renderRoster();
}

function renderParty() {
    const edit = document.getElementById('party-edit');
    const r1 = party.slice(0,3), r2 = party.slice(3,6);
    const slot = (id) => {
        const u = ROSTER.find(x => x.id === id);
        return `<div class="mini-slot">${u ? u.n : ''}</div>`;
    };
    edit.innerHTML = `<div class="unit-row">${slot(r1[0])}${slot(r1[1])}${slot(r1[2])}</div>
                      <div class="unit-row">${slot(r2[0])}${slot(r2[1])}${slot(r2[2])}</div>`;
}

function showTab(id) {
    document.querySelectorAll('.tab-content, .nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    document.getElementById('nav-'+id).classList.add('active');
    if(id==='roster') renderRoster();
    if(id==='party') renderParty();
}

function startExpedition() { document.getElementById('exploring-screen').style.display = 'flex'; }
function stopExpedition() { document.getElementById('exploring-screen').style.display = 'none'; }

renderRoster();
</script>
</body>
</html>
