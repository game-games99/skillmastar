<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION v1.35</title>
    <style>
        :root { --bg: #050505; --panel: #111; --acc: #C5A059; --hp: #ff4d4d; --ct: #4da6ff; --msg: #001a33; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Noto Sans JP', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        #game-container { width: 100%; max-width: 600px; height: 100%; display: grid; grid-template-rows: 50px 1fr 60px; border: 1px solid #333; }
        header { background: #222; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--acc); font-size: 14px; font-weight: bold; }
        #view-area { position: relative; overflow-y: auto; background: #000; }
        nav { background: #222; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; }
        .nav-btn { background: #333; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: var(--acc); color: #000; }

        /* ホーム・編成・詳細UI */
        .tab-content { display: none; padding: 10px; }
        .tab-content.active { display: block; }
        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .unit-card { background: var(--panel); border: 1px solid #444; padding: 10px; border-radius: 4px; }
        .btn-action { background: #444; color: #fff; border: 1px solid #666; padding: 5px; cursor: pointer; width: 100%; margin-top: 5px; }

        /* ダンジョンUI */
        #explore-view { position: relative; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        #progress-ui { position: absolute; top: 10px; width: 90%; }
        .bar-bg { background: #333; height: 10px; border-radius: 5px; overflow: hidden; }
        #bar-fill { height: 100%; background: var(--acc); width: 0%; transition: width 0.2s; }
        #enemy-visual-box { width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; }
        #enemy-img, #chest-img { max-width: 100%; max-height: 100%; }
        #log-window { position: absolute; bottom: 0; width: 100%; height: 120px; background: rgba(0,26,51,0.9); font-size: 11px; padding: 5px; overflow-y: auto; color: #fff; }
        .choice-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; display: none; }
    </style>
</head>
<body>
<div id="game-container">
    <header><div id="gold-display">Gold: 0</div><div id="floor-info">Babel</div></header>
    <main id="view-area">
        <section id="tab-roster" class="tab-content active">
            <h3>騎士団管理</h3>
            <div class="card-grid" id="roster-list"></div>
        </section>
        <section id="tab-party" class="tab-content">
            <h3>部隊編成 (前衛/後衛 各最大3名)</h3>
            <div id="party-config" style="margin-bottom:20px;"></div>
            <div id="bench-list" class="card-grid"></div>
        </section>
        <section id="tab-dungeon" class="tab-content">
            <h3>塔への進入</h3>
            <p>開始階層を選択:</p>
            <input type="number" id="start-floor" value="1" min="1" style="width:60px;"> F
            <div style="margin-top:20px;">
                <label><input type="checkbox" id="auto-mode"> オート探索を有効化</label>
            </div>
            <button class="btn-action" style="background:#a20; padding:15px; font-size:18px;" onclick="startExpedition()">探索開始</button>
        </section>
        <section id="tab-exploring" class="tab-content" style="height:100%; padding:0;">
            <div id="explore-view">
                <div id="progress-ui">
                    <div style="display:flex; justify-content:space-between;">
                        <span id="txt-floor-cur">1F</span> <span id="txt-meter-cur">0m</span>
                    </div>
                    <div class="bar-bg"><div id="bar-fill"></div></div>
                </div>
                <div id="enemy-visual-box">
                    <img id="enemy-img" src="" style="display:none;">
                    <img id="chest-img" src="" style="display:none;">
                </div>
                <div id="enemy-name-label" style="font-weight:bold; color:var(--hp);"></div>
                <div id="log-window"></div>
                <div id="branch-choice" class="choice-overlay">
                    <h2 id="choice-title">50m地点 到着</h2>
                    <button class="btn-action" style="width:200px; padding:10px;" onclick="handleChoice(true)">さらに奥へ進む</button>
                    <button class="btn-action" style="width:200px; padding:10px; background:#444;" onclick="handleChoice(false)">拠点へ引き返す</button>
                </div>
            </div>
        </section>
    </main>
    <nav>
        <button class="nav-btn active" onclick="showTab('roster')">騎士団</button>
        <button class="nav-btn" onclick="showTab('party')">編成</button>
        <button class="nav-btn" onclick="showTab('dungeon')">探索</button>
    </nav>
</div>

<script>
// キャラデータ (画像参照に基づき全20名定義)
const ROSTER = [
    { id:1, name:"グラディウス", hp:500n, atk:25n, def:50n, dex:15n, chance:20, ct:5, row:"front", lv:1 },
    { id:2, name:"ヴァレリア", hp:320n, atk:48n, def:20n, dex:60n, chance:35, ct:4, row:"front", lv:1 },
    { id:3, name:"バルド", hp:450n, atk:55n, def:30n, dex:20n, chance:25, ct:6, row:"front", lv:1 },
    { id:10, name:"エリア", hp:310n, atk:15n, def:20n, dex:30n, chance:20, ct:8, row:"back", lv:1 },
    { id:20, name:"アベル", hp:350n, atk:65n, def:20n, dex:40n, chance:15, ct:7, row:"back", lv:1 }
    // ... 他のキャラも同様にスタック
];

let gold = 5000n;
let party = ROSTER.slice(0, 5).map(c => ({...c, curHp: c.hp, curCt: 0}));
let isExploring = false;
let currentFloor = 1;
let currentMeter = 0;
let stackedGold = 0n;
let stackedChests = [];
let autoMode = false;

function showTab(tabId) {
    if (isExploring) return;
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');
    event.currentTarget.classList.add('active');
    renderRoster();
}

function renderRoster() {
    document.getElementById('gold-display').innerText = `Gold: ${gold.toLocaleString()}`;
    const list = document.getElementById('roster-list');
    list.innerHTML = party.map((p, i) => `
        <div class="unit-card">
            <img src="No.${p.id}.png" style="width:100%; height:80px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/80'">
            <b>Lv.${p.lv} ${p.name}</b><br>
            HP: ${p.curHp}/${p.hp}<br>
            <button class="btn-action" onclick="upgradeUnit(${i})">強化 (${p.lv * 500}G)</button>
        </div>
    `).join('');
}

function upgradeUnit(i) {
    const p = party[i];
    const cost = BigInt(p.lv * 500);
    if (gold >= cost) {
        gold -= cost;
        p.lv++; p.hp += 50n; p.atk += 5n; p.curHp = p.hp;
        renderRoster();
    }
}

async function startExpedition() {
    currentFloor = parseInt(document.getElementById('start-floor').value);
    autoMode = document.getElementById('auto-mode').checked;
    isExploring = true;
    currentMeter = 0;
    stackedGold = 0n;
    stackedChests = [];
    party.forEach(p => p.curHp = p.hp);
    
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-exploring').classList.add('active');
    
    runLoop();
}

async function runLoop() {
    while (isExploring && party.some(p => p.curHp > 0)) {
        currentMeter++;
        renderExplore();
        
        // 50m地点の判定
        if (currentMeter === 50 && !autoMode) {
            showChoice("50m地点 到着: 帰還しますか？");
            return; // handleChoiceを待つ
        }

        // 100m地点（ボス戦）
        if (currentMeter >= 100) {
            await doBattle(true);
            if (!isExploring) return;
            showChoice(`${currentFloor}F クリア！進みますか？`, true);
            return;
        }

        // ランダムイベント（50m以降も発生）
        const r = Math.random();
        if (r < 0.08) await doBattle(false);
        else if (r < 0.12) await findChest();
        else if (r < 0.14) triggerTrap();

        await new Promise(r => setTimeout(r, 150));
    }

    if (party.every(p => p.curHp <= 0)) {
        log("全滅しました... 獲得物はすべて失われました。");
        isExploring = false;
        stackedGold = 0n;
        stackedChests = [];
        setTimeout(() => showTab('dungeon'), 2000);
    }
}

function showChoice(title, isEnd = false) {
    const overlay = document.getElementById('branch-choice');
    document.getElementById('choice-title').innerText = title;
    overlay.style.display = 'flex';
}

function handleChoice(proceed) {
    document.getElementById('branch-choice').style.display = 'none';
    if (proceed) {
        if (currentMeter >= 100) { currentFloor++; currentMeter = 0; }
        runLoop();
    } else {
        isExploring = false;
        gold += stackedGold;
        log(`拠点に帰還。${stackedGold}Gと${stackedChests.length}個の宝箱を持ち帰りました。`);
        showTab('roster');
    }
}

async function doBattle(isBoss) {
    const e = { name: isBoss ? "階層守護者" : "モンスター", hp: BigInt(currentFloor * (isBoss ? 5000 : 800)) };
    document.getElementById('enemy-name-label').innerText = e.name;
    document.getElementById('enemy-img').style.display = 'block';
    
    let ehp = e.hp;
    while(ehp > 0 && party.some(p => p.curHp > 0)) {
        party.forEach(p => { if(p.curHp > 0) ehp -= p.atk; });
        if(ehp > 0) party[0].curHp -= BigInt(currentFloor * 10); // ヘイト簡易版
        renderExplore();
        await new Promise(r => setTimeout(r, 200));
    }
    document.getElementById('enemy-img').style.display = 'none';
    document.getElementById('enemy-name-label').innerText = "";
    if (ehp <= 0) stackedGold += BigInt(currentFloor * 100);
}

async function findChest() {
    const chestImg = document.getElementById('chest-img');
    chestImg.style.display = 'block';
    log("宝箱を発見！スタックに追加。");
    stackedChests.push({ quality: Math.random() });
    await new Promise(r => setTimeout(r, 500));
    chestImg.style.display = 'none';
}

function triggerTrap() {
    log("トラップ作動！パーティにダメージ。");
    party.forEach(p => p.curHp -= p.hp / 10n);
}

function renderExplore() {
    document.getElementById('txt-floor-cur').innerText = `${currentFloor}F`;
    document.getElementById('txt-meter-cur').innerText = `${currentMeter}m`;
    document.getElementById('bar-fill').style.width = `${currentMeter}%`;
}

function log(m) {
    const win = document.getElementById('log-window');
    win.innerHTML = `> ${m}<br>${win.innerHTML}`;
}
</script>
</body>
</html>
