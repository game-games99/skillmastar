<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalice Knights Clone</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2a2a2a;
            --text-color: #ffffff;
            --accent-color: #ffd700;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        #game-container {
            width: 100%;
            max-width: 400px;
            border: 2px solid #444;
            padding: 10px;
            background: #000;
        }
        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            color: var(--accent-color);
        }
        .party-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin: 15px 0;
        }
        .unit-card {
            font-size: 10px;
            text-align: center;
            background: var(--panel-color);
            padding: 5px;
            border-radius: 4px;
        }
        .hp-bar-bg {
            background: #444;
            height: 4px;
            width: 100%;
            margin-top: 3px;
        }
        .hp-bar-fill {
            background: #00ff00;
            height: 100%;
            transition: width 0.3s;
        }
        #battle-log {
            height: 200px;
            overflow-y: auto;
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 8px;
            font-size: 12px;
            line-height: 1.4;
            color: #ccc;
        }
        .log-hit { color: #fff; font-weight: bold; }
        .log-kill { color: var(--accent-color); }
        .controls {
            margin-top: 15px;
            text-align: center;
        }
        button {
            background: var(--accent-color);
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { background: #666; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div id="dist">0m</div>
        <div id="quest-name">始まりの草原</div>
        <div id="drops">アイテム: 0</div>
    </div>

    <div class="party-container" id="party-ui"></div>

    <div id="battle-log"></div>

    <div class="controls">
        <button id="btn-start" onclick="game.startQuest()">クエスト開始</button>
    </div>
</div>

<script>
/**
 * Chalice Knights Core Engine
 * ガイドライン遵守：NaN防止、乗算統一、最大5人編成
 */

const DB = {
    units: [
        { name: "ベアトリクス", hp: 2631, atk: 125, skill: "聖なる祈り", mult: 1.5 },
        { name: "クローディア", hp: 2984, atk: 152, skill: "華麗なる一閃", mult: 1.8 },
        { name: "ドゥーガルド", hp: 2362, atk: 185, skill: "大賢者の裁き", mult: 2.2 },
        { name: "カルロス", hp: 2323, atk: 210, skill: "渾身の一撃", mult: 2.5 },
        { name: "ユーリ", hp: 2100, atk: 190, skill: "影縫い", mult: 2.0 }
    ],
    enemies: [
        { name: "マンドラゴラ", lv: 19, hp: 1500 },
        { name: "スケルトン", lv: 22, hp: 2000 },
        { name: "ゴーレム", lv: 25, hp: 5000 }
    ]
};

class Game {
    constructor() {
        this.distance = 0;
        this.dropCount = 0;
        this.party = DB.units.map(u => ({ ...u, curHp: u.hp }));
        this.initUI();
    }

    initUI() {
        const container = document.getElementById('party-ui');
        container.innerHTML = this.party.map((u, i) => `
            <div class="unit-card">
                <div>${u.name}</div>
                <div class="hp-bar-bg"><div id="hp-${i}" class="hp-bar-fill" style="width:100%"></div></div>
                <div style="font-size:8px">${u.curHp}</div>
            </div>
        `).join('');
    }

    log(msg, type = '') {
        const logBox = document.getElementById('battle-log');
        const div = document.createElement('div');
        div.className = type;
        div.innerText = msg;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    async startQuest() {
        document.getElementById('btn-start').disabled = true;
        this.log("--- 冒険に出発しました ---");

        for (let i = 0; i < 3; i++) {
            await this.sleep(1000);
            this.distance += 10;
            document.getElementById('dist').innerText = `${this.distance}m`;
            
            const enemy = { ...DB.enemies[i] };
            this.log(`【${this.distance}m】LV${enemy.lv} ${enemy.name}が現れた！`);
            await this.battle(enemy);
        }

        this.log("--- クエストクリア！ ---", "log-kill");
        document.getElementById('btn-start').disabled = false;
    }

    async battle(enemy) {
        let turn = 0;
        while (enemy.hp > 0 && turn < 20) {
            const actor = this.party[turn % 5];
            const dmg = Math.floor(actor.atk * actor.mult); // 倍率は乗算統一
            
            await this.sleep(500);
            enemy.hp -= dmg;
            this.log(`${actor.name}の【${actor.skill}】が決まった！`, "log-hit");
            this.log(`LV${enemy.lv} ${enemy.name}に ${dmg} のダメージ！`);

            if (enemy.hp <= 0) {
                this.log(`LV${enemy.lv} ${enemy.name}を倒した！`, "log-kill");
                this.dropCount++;
                document.getElementById('drops').innerText = `アイテム: ${this.dropCount}`;
                break;
            }
            turn++;
        }
    }

    sleep(ms) { return new Promise(res => setTimeout(res, ms)); }
}

const game = new Game();
</script>

</body>
</html>
