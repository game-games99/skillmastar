　<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スキルマスター - 神の塔踏破記 - Ver 0.3.1</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-color: #121212;
            --text-color: #dcdcdc;
            --accent-color: #ffd700;
            --hp-color: #e63946;
            --mp-color: #457b9d;
            --rarity-star: #ff00ff;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Sawarabi Gothic', 'MS Gothic', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #game-container { width: 98%; max-width: 1200px; margin-top: 10px; display: grid; grid-template-columns: 350px 1fr; gap: 10px; }
        .panel { background: var(--panel-color); border: 1px solid #333; padding: 12px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        h2 { border-left: 4px solid var(--accent-color); padding-left: 10px; margin: 0 0 10px 0; font-size: 1.1em; color: var(--accent-color); }
        .full-width { grid-column: span 2; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 0.85em; }
        .log { height: 300px; overflow-y: auto; background: #000; padding: 8px; font-size: 0.8em; line-height: 1.5; border: 1px solid #222; margin-bottom: 10px; }
        .btn { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 8px 12px; cursor: pointer; font-size: 0.9em; transition: 0.1s; }
        .btn:hover:not(:disabled) { background: var(--accent-color); color: #000; }
        .btn:disabled { opacity: 0.3; }
        .bar-container { width: 100%; background: #222; height: 10px; margin: 3px 0; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
        .bar-fill { height: 100%; transition: width 0.2s; }
        .hp-bar { background: var(--hp-color); }
        .mp-bar { background: var(--mp-color); }
        .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; max-height: 500px; overflow-y: auto; padding: 5px; }
        .skill-card { background: #1a1a1a; padding: 6px; border: 1px solid #333; font-size: 0.7em; position: relative; }
        .obtained { border-color: var(--accent-color); color: #fff; }
        .not-obtained { color: #444; }
        .tab-menu { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; }
        .badge { font-size: 0.7em; padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
        .active-badge { background: #004488; }
        .passive-badge { background: #444400; }
    </style>
</head>
<body>

<h1>スキルマスター <small style="font-size: 0.5em;">Ver 0.3.1 [Purged Legacy Rules]</small></h1>

<div id="game-container">
    <div class="panel">
        <h2 id="player-name">---</h2>
        <div id="job-display" style="font-size: 0.9em; margin-bottom: 5px;"></div>
        <div class="bar-container"><div id="hp-bar" class="bar-fill hp-bar"></div></div>
        <div id="hp-text" style="font-size: 0.75em; text-align: right;"></div>
        <div class="bar-container"><div id="mp-bar" class="bar-fill mp-bar"></div></div>
        <div id="mp-text" style="font-size: 0.75em; text-align: right;"></div>
        <div class="status-grid" id="status-values"></div>
    </div>

    <div class="panel">
        <h2 id="enemy-name">待機中</h2>
        <div id="enemy-kind" style="font-size: 0.8em; color: #777;"></div>
        <div class="bar-container"><div id="enemy-hp-bar" class="bar-fill hp-bar"></div></div>
        <div id="enemy-hp-text" style="font-size: 0.75em; text-align: right;"></div>
        <div id="enemy-status" class="status-grid" style="font-size: 0.75em; margin-top: 5px;"></div>
    </div>

    <div class="panel full-width">
        <div class="tab-menu">
            <button class="btn" onclick="showTab('battle')">戦場</button>
            <button class="btn" onclick="showTab('skill')">スキル図鑑 (<span id="skill-count">0</span>/200)</button>
            <button class="btn" onclick="showTab('job')">転職</button>
            <button class="btn" onclick="showTab('equip')">装備品質</button>
        </div>
        
        <div id="tab-battle">
            <div id="log" class="log"></div>
            <button class="btn" id="attack-btn" onclick="battleTurn()">攻撃開始</button>
            <button class="btn" onclick="saveGame()">記録保存</button>
        </div>

        <div id="tab-skill" style="display:none;">
            <div id="skill-grid" class="skill-grid"></div>
        </div>

        <div id="tab-job" style="display:none;"><div id="job-list"></div></div>
        <div id="tab-equip" style="display:none;"><div id="equip-info"></div></div>
    </div>
</div>

<script>
// --- データ定義 (200スキル) ---
const SKILL_MASTER = [];
for(let i=1; i<=200; i++) {
    const id = "S" + String(i).padStart(3, '0');
    let s = { id: id, name: `スキル${id}`, type: "passive", desc: "", effect: {}, condition: {} };
    if(i <= 50) {
        s.name = ["強打", "瞑想", "皮膜", "俊敏", "集中"][i%5] + (Math.floor(i/5)+1);
        s.type = i%3 === 0 ? "active" : "passive";
        s.condition = { type: "lv", val: i * 2 };
        if(s.type === "active") { s.rate = 0.1 + (i*0.002); s.mp = 10 + i; s.mult = 1.5 + (i*0.02); s.desc = `威力${s.mult.toFixed(1)}倍`; }
        else { s.effect = { atk: i, hp: i*5 }; s.desc = `ATK+${i}, HP+${i*5}`; }
    } else if(i <= 150) {
        s.name = ["属性剣", "魔力盾", "不屈", "神速", "略奪"][i%5] + (Math.floor(i/5));
        s.type = i%4 === 0 ? "active" : "passive";
        s.condition = { type: "kill", val: i * 10 };
        if(s.type === "active") { s.rate = 0.15; s.mp = 25; s.mult = 3.0; s.desc = "高威力攻撃"; }
        else { s.effect = { def: i/2, spd: i/5 }; s.desc = `DEF+${Math.floor(i/2)}`; }
    } else {
        s.name = ["虚空", "因果", "転生", "神殺", "深淵"][i%5] + "の極み";
        s.type = "active";
        s.condition = { type: "floor", val: 90 + (i%11) };
        s.rate = 0.05; s.mp = 100; s.mult = 10.0 + (i-150);
        s.desc = "神をも屠る究極の一撃";
    }
    SKILL_MASTER.push(s);
}

const JOBS = {
    "novice": { name: "冒険者", bonus: { atk: 1, hp: 1, mp: 1, def: 1, spd: 1 }, next: ["warrior", "mage", "thief", "cleric"] },
    "warrior": { name: "戦士", bonus: { atk: 1.4, hp: 1.5, mp: 0.6, def: 1.3, spd: 0.8 }, next: ["knight", "berserker"] },
    "mage": { name: "魔術師", bonus: { atk: 0.7, hp: 0.8, mp: 2.0, def: 0.7, spd: 1.1 }, next: ["wizard", "sage"] },
    "thief": { name: "盗賊", bonus: { atk: 1.1, hp: 0.9, mp: 0.9, def: 0.8, spd: 1.8 }, next: ["assassin", "ninja"] },
    "cleric": { name: "聖職者", bonus: { atk: 0.8, hp: 1.3, mp: 1.5, def: 1.2, spd: 0.9 }, next: ["paladin", "bishop"] },
    "knight": { name: "騎士", bonus: { atk: 1.6, hp: 2.0, mp: 1.1, def: 2.0, spd: 0.9 } },
    "berserker": { name: "狂戦士", bonus: { atk: 2.5, hp: 1.6, mp: 0.4, def: 0.5, spd: 1.4 } },
    "wizard": { name: "大魔導師", bonus: { atk: 1.1, hp: 1.1, mp: 3.0, def: 0.8, spd: 1.3 } },
    "sage": { name: "賢者", bonus: { atk: 1.3, hp: 1.5, mp: 2.5, def: 1.5, spd: 1.2 } },
    "assassin": { name: "暗殺者", bonus: { atk: 2.0, hp: 1.1, mp: 1.1, def: 0.9, spd: 2.5 } },
    "ninja": { name: "忍者", bonus: { atk: 1.8, hp: 1.2, mp: 1.4, def: 1.0, spd: 3.0 } },
    "paladin": { name: "聖騎士", bonus: { atk: 1.5, hp: 2.5, mp: 1.5, def: 2.5, spd: 1.1 } },
    "bishop": { name: "司教", bonus: { atk: 1.0, hp: 1.8, mp: 2.8, def: 1.6, spd: 1.2 } }
};

// --- ゲーム状態 ---
let p = {
    lv: 1, exp: 0, floor: 1, kills: 0, job: "novice",
    hp: 150, mHp: 150, mp: 80, mMp: 80,
    atk: 20, def: 12, spd: 10, hit: 95, avd: 5,
    skills: ["S001"],
    equips: { 
        w: { n: "折れた剣", v: 5, q: 100 }, 
        a: { n: "ボロ布", v: 3, q: 100 }
    }
};
let enemy = null;

// --- ロジック ---
function updateUI() {
    const j = JOBS[p.job];
    let bAtk=0, bDef=0, bHp=0, bMp=0, bSpd=0;
    p.skills.forEach(id => {
        const s = SKILL_MASTER.find(m => m.id === id);
        if(s && s.type === "passive") {
            bAtk += (s.effect.atk || 0); bDef += (s.effect.def || 0);
            bHp += (s.effect.hp || 0); bMp += (s.effect.mp || 0); bSpd += (s.effect.spd || 0);
        }
    });

    const totalAtk = Math.floor((p.atk + bAtk + (p.equips.w.v * p.equips.w.q/100)) * j.bonus.atk);
    const totalDef = Math.floor((p.def + bDef + (p.equips.a.v * p.equips.a.q/100)) * j.bonus.def);
    const totalMaxHp = Math.floor((p.mHp + bHp) * j.bonus.hp);
    const totalMaxMp = Math.floor((p.mMp + bMp) * j.bonus.mp);
    const totalSpd = Math.floor((p.spd + bSpd) * j.bonus.spd);

    document.getElementById('player-name').innerText = `勇者 Lv.${p.lv}`;
    document.getElementById('job-display').innerText = `職業: ${j.name} / 階層: ${p.floor}F`;
    document.getElementById('hp-text').innerText = `${Math.floor(p.hp)} / ${totalMaxHp}`;
    document.getElementById('hp-bar').style.width = `${(p.hp/totalMaxHp)*100}%`;
    document.getElementById('mp-text').innerText = `${Math.floor(p.mp)} / ${totalMaxMp}`;
    document.getElementById('mp-bar').style.width = `${(p.mp/totalMaxMp)*100}%`;

    document.getElementById('status-values').innerHTML = `
        <div>攻撃: ${totalAtk}</div><div>防御: ${totalDef}</div>
        <div>速度: ${totalSpd}</div><div>討伐: ${p.kills}</div>
    `;

    if(enemy) {
        document.getElementById('enemy-name').innerText = enemy.name;
        document.getElementById('enemy-hp-text').innerText = `${Math.max(0, enemy.hp)} / ${enemy.mHp}`;
        document.getElementById('enemy-hp-bar').style.width = `${(enemy.hp/enemy.mHp)*100}%`;
    }
}

function spawn() {
    const m = 1 + (p.floor * 0.25);
    const isBoss = p.floor % 10 === 0;
    enemy = {
        name: isBoss ? `${p.floor}F 守護神` : `階層の魔物`,
        hp: Math.floor((isBoss ? 600 : 100) * m),
        mHp: Math.floor((isBoss ? 600 : 100) * m),
        atk: Math.floor((isBoss ? 45 : 18) * m),
        def: Math.floor((isBoss ? 35 : 12) * m),
        exp: Math.floor(40 * m)
    };
    log(`[${p.floor}F] ${enemy.name}が現れた！`, isBoss ? var(--accent-color) : "#fff");
    updateUI();
}

function battleTurn() {
    if(!enemy) return;
    const j = JOBS[p.job];
    const totalAtk = Math.floor((p.atk + (p.equips.w.v * p.equips.w.q/100)) * j.bonus.atk);
    const totalDef = Math.floor((p.def + (p.equips.a.v * p.equips.a.q/100)) * j.bonus.def);

    let dmg = Math.max(1, totalAtk - enemy.def);
    p.skills.forEach(id => {
        const s = SKILL_MASTER.find(m => m.id === id);
        if(s && s.type === "active" && Math.random() < s.rate && p.mp >= s.mp) {
            p.mp -= s.mp; dmg = Math.floor(dmg * s.mult);
            log(`【${s.name}】が発動！`, var(--mp-color));
        }
    });
    enemy.hp -= dmg;
    log(`${enemy.name}に ${dmg} のダメージ！`);

    if(enemy.hp <= 0) {
        log(`${enemy.name}を討伐。`, var(--accent-color));
        p.kills++; p.exp += enemy.exp;
        if(p.exp >= p.lv * 120) levelUp();
        checkUnlocks(); drop(); p.floor++; spawn();
        return;
    }

    let edmg = Math.max(1, enemy.atk - totalDef);
    p.hp -= edmg;
    log(`${enemy.name}の攻撃！ ${edmg} のダメージ！`, "#f55");

    if(p.hp <= 0) {
        log("敗北した... 塔の魔力に押し返された。", "#f00");
        p.floor = Math.max(1, p.floor - 5); // 5階層戻される
        p.hp = 1; // 瀕死で帰還
        spawn();
    }
    updateUI();
}

function levelUp() {
    p.lv++; p.exp = 0;
    p.mHp += Math.floor(Math.random()*15)+5; p.mMp += Math.floor(Math.random()*8)+3;
    p.atk += Math.floor(Math.random()*4)+1; p.def += Math.floor(Math.random()*4)+1;
    p.spd += Math.floor(Math.random()*2)+1;
    log(`Lv.${p.lv}に上昇！`, var(--accent-color));
}

function drop() {
    if(Math.random() > 0.35) return;
    const q = Math.floor(Math.random()*100)+1;
    const isW = Math.random() > 0.5;
    const newItem = { n: (isW?"神石の剣":"魔鋼の鎧"), v: 10 + Math.floor(p.floor * 2.2), q: q };
    const curV = isW ? (p.equips.w.v * p.equips.w.q/100) : (p.equips.a.v * p.equips.a.q/100);
    if((newItem.v * q/100) > curV) {
        log(`★装備更新: ${newItem.n} (${q}%)`, var(--rarity-star));
        if(isW) p.equips.w = newItem; else p.equips.a = newItem;
    }
}

function checkUnlocks() {
    SKILL_MASTER.forEach(s => {
        if(p.skills.includes(s.id)) return;
        let ok = false;
        if(s.condition.type === "lv" && p.lv >= s.condition.val) ok = true;
        if(s.condition.type === "kill" && p.kills >= s.condition.val) ok = true;
        if(s.condition.type === "floor" && p.floor >= s.condition.val) ok = true;
        if(ok) { p.skills.push(s.id); log(`【新スキル覚醒: ${s.name}】`, var(--accent-color)); }
    });
}

function showTab(t) {
    ["battle","skill","job","equip"].forEach(x => document.getElementById(`tab-${x}`).style.display = (x===t?'block':'none'));
    if(t==='skill') {
        const g = document.getElementById('skill-grid'); g.innerHTML = "";
        document.getElementById('skill-count').innerText = p.skills.length;
        SKILL_MASTER.forEach(s => {
            const has = p.skills.includes(s.id);
            g.innerHTML += `<div class="skill-card ${has?'obtained':'not-obtained'}">
                <span class="badge ${s.type==='active'?'active-badge':'passive-badge'}">${s.type}</span><br>
                <strong>${has?s.name:'？？？'}</strong><br>${has?s.desc:'未開放'}</div>`;
        });
    }
    if(t==='job') {
        const l = document.getElementById('job-list'); l.innerHTML = "";
        const cur = JOBS[p.job];
        if(cur.next) cur.next.forEach(nx => {
            l.innerHTML += `<button class="btn" onclick="p.job='${nx}';updateUI();showTab('job')">${JOBS[nx].name}へ</button>`;
        }); else l.innerText = "極めし者。";
    }
}

function log(m, c="#fff") {
    const e = document.getElementById('log');
    e.innerHTML += `<div style="color:${c}">${m}</div>`;
    e.scrollTop = e.scrollHeight;
}

function saveGame() { localStorage.setItem('SKILLMASTER_SAVE', JSON.stringify(p)); log("進行状況を保存しました。"); }
function load() { const d = localStorage.getItem('SKILLMASTER_SAVE'); if(d) p = JSON.parse(d); spawn(); updateUI(); }

window.onload = load;
</script>
</body>
</html>
