<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION v1.36</title>
    <style>
        :root { --bg: #050505; --panel: #002244; --acc: #C5A059; --header-blue: #003366; --hp-fill: #4caf50; }
        body { background: #000; color: #e0e0e0; font-family: 'Noto Sans JP', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        #game-container { width: 100%; max-width: 600px; height: 100%; display: grid; grid-template-rows: 50px 1fr 60px; position: relative; }
        
        header { background: #222; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--acc); font-size: 14px; }
        #view-area { position: relative; overflow-y: auto; background: #000; }
        nav { background: #222; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; height: 60px; }
        .nav-btn { background: #333; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: var(--acc); color: #000; }

        .tab-content { display: none; padding: 10px; height: 100%; box-sizing: border-box; }
        .tab-content.active { display: block; }

        .unit-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .unit-table th { background: #222; color: var(--acc); padding: 10px; text-align: left; border-bottom: 1px solid #444; }
        .unit-table td { padding: 10px; border-bottom: 1px solid #222; }

        /* 探索UI (スクショ準拠) */
        #tab-exploring { padding: 0; background: #000; position: relative; }
        .explore-header { position: absolute; top: 0; left: 0; width: 100%; height: 80px; background: var(--header-blue); display: flex; align-items: center; padding: 0 10px; z-index: 10; }
        .floor-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.4); margin-right: 15px; }
        .floor-circle .f-num { font-size: 11px; color: #88aaff; }
        .floor-circle .m-num { font-size: 26px; font-weight: bold; }
        #log-window { flex: 1; font-size: 16px; font-weight: bold; color: #fff; }

        #visual-area { height: 60%; display: flex; align-items: center; justify-content: center; position: relative; }
        #visual-area img { max-width: 80%; max-height: 80%; display: none; }

        .party-container { position: absolute; bottom: 0; width: 100%; height: 40%; background: #000; display: flex; flex-direction: column; gap: 4px; padding: 4px; box-sizing: border-box; }
        .unit-row { display: flex; justify-content: center; gap: 4px; flex: 1; }
        .unit-mini-card { flex: 1; max-width: 115px; background: var(--panel); border: 1px solid #004488; display: flex; flex-direction: column; overflow: hidden; }
        .unit-mini-card .name-tag { background: #003366; font-size: 11px; text-align: center; padding: 2px; font-weight: bold; }
        .unit-mini-card img { width: 100%; height: 65px; object-fit: cover; }
        .unit-mini-card .hp-val { font-size: 10px; text-align: right; padding-right: 4px; font-family: monospace; }
        .unit-mini-card .hp-bar-bg { background: #111; height: 8px; margin: 2px 4px 4px 4px; border: 1px solid #333; }
        .unit-mini-card .hp-bar-fill { height: 100%; background: var(--hp-fill); transition: width 0.3s; }

        .choice-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; display: none; }
    </style>
</head>
<body>
<div id="game-container">
    <header id="base-header">
        <div id="gold-display">Gold: 0</div>
        <div id="floor-info">Babel HQ</div>
    </header>

    <main id="view-area">
        <section id="tab-roster" class="tab-content active">
            <h3 style="color:var(--acc);">解放の騎士団</h3>
            <table class="unit-table">
                <thead><tr><th>名前</th><th>HP</th></tr></thead>
                <tbody id="roster-list-body"></tbody>
            </table>
        </section>

        <section id="tab-party" class="tab-content">
            <h3 style="color:var(--acc);">現在の部隊</h3>
            <div id="party-preview" class="party-container" style="position:relative; height:300px; border:1px dashed var(--acc);"></div>
        </section>

        <section id="tab-dungeon" class="tab-content">
            <h3 style="color:var(--acc);">探索</h3>
            <button class="nav-btn" style="width:100%; padding:20px; font-size:18px;" onclick="startExpedition()">探索開始</button>
        </section>

        <section id="tab-exploring" class="tab-content">
            <div class="explore-header">
                <div class="floor-circle">
                    <span class="f-num" id="txt-floor-cur">F63</span>
                    <span class="m-num" id="txt-meter-cur">0m</span>
                </div>
                <div id="log-window"></div>
            </div>
            <div id="visual-area"><img id="enemy-img" src=""></div>
            <div class="party-container" id="battle-party-area"></div>
            <div id="branch-choice" class="choice-overlay">
                <h2 style="color:var(--acc);">探索完了</h2>
                <div id="result-gold" style="margin-bottom:20px;"></div>
                <button class="nav-btn" style="width:200px; padding:15px; margin-bottom:10px;" onclick="handleChoice(true)">進む</button>
                <button class="nav-btn" style="width:200px; padding:15px;" onclick="handleChoice(false)">帰還</button>
            </div>
        </section>
    </main>

    <nav id="base-nav">
        <button id="nav-roster" class="nav-btn active" onclick="showTab('roster')">騎士団</button>
        <button id="nav-party" class="nav-btn" onclick="showTab('party')">編成</button>
        <button id="nav-dungeon" class="nav-btn" onclick="showTab('dungeon')">探索</button>
    </nav>
</div>

<script>
const ROSTER_DATA = [
    { id:1, name:"グラディウス", hp:500n, max:500n },
    { id:2, name:"ヴァレリア", hp:320n, max:320n },
    { id:3, name:"バルド", hp:450n, max:450n },
    { id:4, name:"セレネ", hp:300n, max:300n },
    { id:5, name:"レイス", hp:280n, max:280n },
    { id:6, name:"リュカ", hp:290n, max:290n },
    { id:7, name:"アルベルト", hp:340n, max:340n },
    { id:8, name:"カエデ", hp:380n, max:380n },
    { id:9, name:"ジーク", hp:260n, max:260n },
    { id:10, name:"エリア", hp:310n, max:310n },
    { id:11, name:"ラウル", hp:270n, max:270n },
    { id:12, name:"ミラ", hp:320n, max:320n },
    { id:13, name:"キリガ", hp:285n, max:285n },
    { id:14, name:"リリス", hp:305n, max:305n },
    { id:15, name:"ゼイン", hp:360n, max:360n },
    { id:16, name:"イザナ", hp:410n, max:410n },
    { id:17, name:"ギル", hp:550n, max:550n },
    { id:18, name:"クロノ", hp:275n, max:275n },
    { id:19, name:"フィオナ", hp:400n, max:400n },
    { id:20, name:"アベル", hp:350n, max:350n }
];

let gold = 10000n;
let currentPartyIds = [1, 2, 3, 4, 5]; 
let isExploring = false;
let floor = 63;
let meter = 0;
let stackedGold = 0n;

function renderRoster() {
    const body = document.getElementById('roster-list-body');
    body.innerHTML = ROSTER_DATA.map(u => `<tr><td>${u.name}</td><td>${u.hp}</td></tr>`).join('');
    document.getElementById('gold-display').innerText = `Gold: ${gold.toLocaleString()}`;
}

function renderBattleParty(targetId) {
    const area = document.getElementById(targetId);
    const units = ROSTER_DATA.filter(u => currentPartyIds.includes(u.id));
    const row1 = units.slice(0, 3);
    const row2 = units.slice(3, 5);
    const makeRow = (list) => `<div class="unit-row">${list.map(u => `
        <div class="unit-mini-card">
            <div class="name-tag">${u.name}</div>
            <img src="No.${u.id}.png" onerror="this.src='https://via.placeholder.com/100?text=UNIT'">
            <div class="hp-val">${u.hp}/${u.max}</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${Number(u.hp*100n/u.max)}%"></div></div>
        </div>`).join('')}</div>`;
    area.innerHTML = makeRow(row1) + makeRow(row2);
}

function showTab(id) {
    if (isExploring) return;
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${id}`).classList.add('active');
    if(id === 'roster') renderRoster();
    if(id === 'party') renderBattleParty('party-preview');
}

function startExpedition() {
    isExploring = true; meter = 0; stackedGold = 0n;
    document.getElementById('base-header').style.display = 'none';
    document.getElementById('base-nav').style.display = 'none';
    document.getElementById('game-container').style.gridTemplateRows = '1fr';
    showTab('exploring');
    renderBattleParty('battle-party-area');
    log("探索開始");
    loop();
}

async function loop() {
    while(isExploring) {
        meter++;
        document.getElementById('txt-meter-cur').innerText = `${meter}m`;
        document.getElementById('txt-floor-cur').innerText = `F${floor}`;
        if(Math.random() < 0.1) await encounter();
        await new Promise(res => setTimeout(res, 400));
        if(meter >= 20) {
            document.getElementById('result-gold').innerText = `獲得Gold: ${stackedGold}G`;
            document.getElementById('branch-choice').style.display = 'flex';
            return;
        }
    }
}

async function encounter() {
    const img = document.getElementById('enemy-img');
    img.style.display = 'block';
    log("LV19ゴーストが現れた！");
    await new Promise(r => setTimeout(r, 1000));
    img.style.display = 'none';
    log("撃破");
}

function log(m) { document.getElementById('log-window').innerText = m; }

function handleChoice(proceed) {
    document.getElementById('branch-choice').style.display = 'none';
    if(!proceed) {
        isExploring = false; gold += stackedGold;
        document.getElementById('base-header').style.display = 'flex';
        document.getElementById('base-nav').style.display = 'grid';
        document.getElementById('game-container').style.gridTemplateRows = '50px 1fr 60px';
        showTab('roster');
    } else { meter = 0; loop(); }
}
renderRoster();
</script>
</body>
</html>
