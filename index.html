<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABEL: THE ASCENSION</title>
    <style>
        :root { --bg: #050505; --panel: #1a1a1a; --acc: #ffd700; --hp: #ff4d4d; --dex: #4da6ff; --msg: #001a33; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        #game-container { width: 100%; max-width: 500px; height: 100%; display: grid; grid-template-rows: 50px 1fr 180px 100px; border: 2px solid #333; }
        header { background: #222; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--acc); font-size: 12px; }
        #main-stage { position: relative; background: linear-gradient(to bottom, #000 0%, #111 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #floor-info { position: absolute; top: 10px; left: 10px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; z-index: 5; }
        #tower-bg { text-align: center; color: #4da6ff; text-shadow: 0 0 15px #000; }
        #enemy-display { width: 180px; text-align: center; margin-bottom: 10px; z-index: 10; }
        #party-tray { background: #000; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; border-top: 1px solid #444; }
        .member-card { background: #111; border: 1px solid #333; height: 85px; display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .member-card.is-leader { border: 1.5px solid var(--acc); }
        .char-img { width: 100%; height: 50px; background: #222; object-fit: cover; }
        .hp-bar { width: 100%; height: 5px; background: #333; position: absolute; bottom: 5px; }
        .hp-fill { height: 100%; background: var(--hp); transition: width 0.1s; }
        .ct-bar { width: 100%; height: 2px; background: #000; position: absolute; bottom: 0; }
        .ct-fill { height: 100%; background: var(--dex); transition: width 0.3s; }
        #message-window { background: var(--msg); border-top: 2px solid #06c; padding: 8px; font-size: 11px; overflow-y: auto; color: #fff; }
        .btn-action { background: #850; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 4px; box-shadow: 0 0 10px #f60; }
        .leader-tag { position: absolute; top: 0; left: 0; background: var(--acc); color: #000; font-size: 7px; padding: 1px 3px; font-weight: bold; }
    </style>
</head>
<body>
<div id="game-container">
    <header><div>Gold: 15,052,073G</div><div>勲章: 111</div></header>
    <div id="main-stage">
        <div id="floor-info">F<span id="txt-floor">1</span> <span id="txt-meter">0</span>m</div>
        <div id="enemy-display"></div>
        <div id="tower-bg">
            <h2 id="stage-name" style="margin:0">世界灯台</h2>
            <div id="floor-name" style="font-size:24px; font-weight:bold;">1 階</div>
        </div>
        <button class="btn-action" id="start-btn" style="margin-top:20px">探索開始</button>
    </div>
    <div id="party-tray"></div>
    <div id="message-window" id="log-box"></div>
</div>

<script>
// --- 騎士団データ (最終セット) ---
const KNIGHTS = [
    { id: 1, name: "グラディウス", hp: 3500, atk: 120, def: 250, dex: 300, chance: 20, maxCt: 5, as: "不落の守護", ls: "全体のDEF+20%" },
    { id: 2, name: "ヴァレリア", hp: 2200, atk: 280, def: 120, dex: 950, chance: 35, maxCt: 4, as: "迅雷閃", ls: "全体のDEX+15%" },
    { id: 3, name: "バルド", hp: 3000, atk: 350, def: 150, dex: 400, chance: 25, maxCt: 6, as: "ブラッドレイジ", ls: "全体のATK+20%" },
    { id: 12, name: "ミラ", hp: 2400, atk: 120, def: 140, dex: 500, chance: 20, maxCt: 8, as: "幻晶の盾", ls: "全体の被ダメ10%減" },
    { id: 20, name: "アベル", hp: 2500, atk: 450, def: 130, dex: 700, chance: 15, maxCt: 7, as: "零界", ls: "全ステータス+10%" }
];

// --- 敵データマスタ ---
const MID_BOSSES = ["スケルトンロード", "ソウルイーター", "ヒュドラ", "オークキング", "デーモンクイーン", "古代の守護者", "アイ・オブ・カオス", "シャドウドラゴン"];
const BIG_BOSSES = ["子×牡羊座", "丑×牡牛座", "寅×双子座", "卯×蟹座", "辰×獅子座", "巳×乙女座", "午×天秤座", "未×蠍座", "申×射手座", "酉×水瓶座", "戌×魚座", "亥×山羊座"];

let party = KNIGHTS.map(k => ({...k, curHp: k.hp, curCt: 0, isLeader: false}));
party[0].isLeader = true;
let floor = 1, meter = 0, isBattle = false, prevBoss = null;

function addLog(m) { const l = document.getElementById('message-window'); l.innerHTML = `> ${m}`; }

function render() {
    document.getElementById('txt-floor').innerText = floor;
    document.getElementById('txt-meter').innerText = meter;
    document.getElementById('floor-name').innerText = `${floor} 階`;
    const tray = document.getElementById('party-tray');
    tray.innerHTML = party.map((u, i) => `
        <div class="member-card ${u.isLeader ? 'is-leader' : ''}" onclick="selectL(${i})">
            ${u.isLeader ? '<div class="leader-tag">LEADER</div>' : ''}
            <img src="https://via.placeholder.com/150/222/fff?text=No.${u.id}" class="char-img">
            <div style="font-size:10px; text-align:center;"><b>${u.name}</b></div>
            <div class="hp-bar"><div class="hp-fill" style="width:${(u.curHp/u.hp)*100}%"></div></div>
            <div class="ct-bar"><div class="ct-fill" style="width:${u.curCt > 0 ? (u.curCt/u.maxCt)*100 : 0}%"></div></div>
        </div>`).join('');
}

function selectL(idx) { if(isBattle) return; party.forEach((p, i) => p.isLeader = (i === idx)); render(); }

async function startDungeon() {
    document.getElementById('start-btn').style.display = 'none';
    isBattle = true;
    while(floor <= 100 && party.some(p => p.curHp > 0)) {
        for(meter = 0; meter <= 100; meter += 20) {
            render();
            if(meter === 100) {
                await doBattle();
            } else {
                await new Promise(r => setTimeout(r, 300));
            }
        }
        if(party.every(p => p.curHp <= 0)) break;
        floor++;
        meter = 0;
        addLog(`階層クリア！次の階へ...`);
    }
    isBattle = false;
    document.getElementById('start-btn').style.display = 'block';
}

async function doBattle() {
    let enemyPool = [];
    let isBossFloor = (floor % 10 === 0);
    let isEliteFloor = (floor % 5 === 0 && !isBossFloor);

    if(isBossFloor) {
        let bossName = MID_BOSSES[(floor/10 - 1) % 8];
        enemyPool = [{ name: `中ボス:${bossName}`, hp: floor * 2000, atk: floor * 40, def: floor * 20, dex: 350 }];
        prevBoss = { ...enemyPool[0], name: `エリート:${bossName}` }; 
    } else if(isEliteFloor) {
        enemyPool = [
            { name: "エリートA", hp: floor * 1000, atk: floor * 30, def: floor * 15, dex: 300 },
            { name: "エリートB", hp: floor * 1200, atk: floor * 30, def: floor * 15, dex: 300 }
        ];
        if(prevBoss && floor > 10) enemyPool.push({...prevBoss, hp: floor * 1500});
    } else {
        enemyPool = [{ name: "雑兵", hp: floor * 500, atk: floor * 20, def: floor * 10, dex: 250 }];
    }

    for(let eData of enemyPool) {
        let e = { ...eData, curHp: eData.hp };
        document.getElementById('enemy-display').innerHTML = `<b>${e.name}</b><div class="hp-bar" style="position:static; height:10px;"><div class="hp-fill" style="width:100%"></div></div>`;
        addLog(`${e.name}が出現！`);
        
        while(e.curHp > 0 && party.some(p => p.curHp > 0)) {
            const actors = [...party.filter(p => p.curHp > 0), e].sort((a,b) => b.dex - a.dex);
            for(let a of actors) {
                if(a.curHp <= 0 || (e.curHp <= 0 && a !== e)) continue;
                let t = (a === e) ? party.filter(p => p.curHp > 0)[0] : e;
                if(a !== e) {
                    if(a.curCt === 0 && Math.random() * 100 < a.chance) {
                        let dmg = Math.floor(a.atk * 3.5);
                        t.curHp -= dmg; a.curCt = a.maxCt;
                        addLog(`<span style="color:yellow">${a.name}:${a.as}! ${dmg}ダメ</span>`);
                    } else {
                        let dmg = Math.max(1, a.atk - (t.def/2));
                        t.curHp -= dmg; if(a.curCt > 0) a.curCt--;
                        addLog(`${a.name}の攻撃: ${Math.floor(dmg)}点`);
                    }
                } else {
                    let edmg = Math.max(1, a.atk - (t.def/2));
                    t.curHp -= edmg;
                    addLog(`敵の攻撃！${t.name}へ${Math.floor(edmg)}点`);
                }
                render();
                document.querySelector('#enemy-display .hp-fill').style.width = `${(e.curHp/e.hp)*100}%`;
                await new Promise(r => setTimeout(r, 150));
            }
        }
        if(party.every(p => p.curHp <= 0)) break;
    }
    document.getElementById('enemy-display').innerHTML = "";
}

document.getElementById('start-btn').onclick = startDungeon;
render();
</script>
</body>
</html>
